// ── MODAL DETALLE PROVINCIA ───────────────────────────────────────────────────
function ProvModal({ sector, ots, onClose }) {
  const [q, setQ] = useState('');
  const [ef, setEf] = useState('Todos');
  const [detail, setDetail] = useState(null);

  const rows = ots.filter(r => {
    if (ef !== 'Todos' && r.Estado !== ef) return false;
    if (q) { const s = q.toLowerCase(); return r.OT?.includes(s) || r.Comercio?.toLowerCase().includes(s) || r.Cuenta?.toLowerCase().includes(s); }
    return true;
  });

  const eCounts = {};
  ots.forEach(r => { eCounts[r.Estado] = (eCounts[r.Estado]||0)+1; });
  const estados = ['Todos', ...Object.keys(eCounts)];

  return (
    <div style={{position:'fixed',inset:0,background:'rgba(10,8,35,.65)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:880,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 28px 90px rgba(0,0,0,.4)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>

        {/* Header */}
        <div style={{background:'linear-gradient(135deg,#0f0c29,#312e81)',padding:'22px 28px',color:'#fff',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:22,fontWeight:900,letterSpacing:-.5}}>📍 {sector}</div>
              <div style={{fontSize:12,color:'#a5b4fc',marginTop:4}}>{ots.length} Órdenes de Trabajo · {rows.length} mostradas</div>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',cursor:'pointer',fontWeight:700,fontSize:13}}>✕ Cerrar</button>
          </div>
          <div style={{display:'flex',gap:8,marginTop:14,flexWrap:'wrap'}}>
            {Object.entries(eCounts).map(([e,c]) => (
              <span key={e} style={{background:'rgba(255,255,255,.12)',color:'#fff',borderRadius:99,padding:'3px 12px',fontSize:11,fontWeight:700,border:`1px solid ${ESTADO_C[e]||'#fff'}55`}}>
                <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',background:ESTADO_C[e]||'#fff',marginRight:6,verticalAlign:'middle'}}/>
                {e}: {c}
              </span>
            ))}
          </div>
        </div>

        {/* Filtros */}
        <div style={{padding:'12px 24px',background:'#f8fafc',borderBottom:'1px solid #e8edf5',display:'flex',gap:10,flexWrap:'wrap',alignItems:'center',flexShrink:0}}>
          <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar OT, comercio, cuenta..."
            style={{padding:'7px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,flex:1,minWidth:160,fontFamily:'inherit',outline:'none'}}/>
          <div style={{display:'flex',gap:5,flexWrap:'wrap'}}>
            {estados.map(e=>(
              <button key={e} onClick={()=>setEf(e)} style={{padding:'5px 11px',borderRadius:7,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,background:ef===e?(ESTADO_C[e]||'#4f46e5'):'#e8edf5',color:ef===e?'#fff':'#64748b'}}>{e}</button>
            ))}
          </div>
        </div>

        {/* Tabla */}
        <div style={{overflowY:'auto',flex:1}}>
          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
            <thead style={{position:'sticky',top:0,background:'#f8fafc',zIndex:1}}>
              <tr>
                {['Orden de Trabajo','Comercio','Logística','Estado','Zona','CP','Ciudad','Gestión'].map(h=>(
                  <th key={h} style={{padding:'10px 16px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map((r,i)=>(
                <tr key={i} onClick={()=>setDetail(r)} style={{borderBottom:'1px solid #f1f5f9',cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                  onMouseLeave={e=>e.currentTarget.style.background=''}>
                  <td style={{padding:'10px 16px',fontWeight:800,color:'#4f46e5',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                  <td style={{padding:'10px 16px',maxWidth:190,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.Comercio}>{r.Comercio}</td>
                  <td style={{padding:'10px 16px',color:'#64748b',fontSize:12}}>{r.Logistica}</td>
                  <td style={{padding:'10px 16px'}}>
                    <span style={{background:(ESTADO_C[r.Estado]||'#94a3b8')+'22',color:ESTADO_C[r.Estado]||'#94a3b8',border:`1px solid ${ESTADO_C[r.Estado]||'#e2e8f0'}`,borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:700,whiteSpace:'nowrap'}}>{r.Estado}</span>
                  </td>
                  <td style={{padding:'10px 16px'}}>
                    {(() => { const zc=ZONA_C[r.Zona]; return zc?<span style={{background:zc.bg,color:zc.text,border:`1px solid ${zc.bd}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Zona}</span>:r.Zona; })()}
                  </td>
                  <td style={{padding:'10px 16px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                  <td style={{padding:'10px 16px',color:'#64748b'}}>{r.Ciudad}</td>
                  <td style={{padding:'10px 16px',color:'#94a3b8',fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.GestionEstado}</td>
                </tr>
              ))}
              {rows.length===0 && <tr><td colSpan={8} style={{textAlign:'center',padding:40,color:'#94a3b8'}}>Sin resultados</td></tr>}
            </tbody>
          </table>
        </div>
      </div>

      {/* Sub-modal OT */}
      {detail && (
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.55)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400}} onClick={()=>setDetail(null)}>
          <div style={{background:'#fff',borderRadius:20,padding:28,maxWidth:520,width:'90%',maxHeight:'82vh',overflowY:'auto',boxShadow:'0 24px 70px rgba(0,0,0,.35)'}} onClick={e=>e.stopPropagation()}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
              <div>
                <div style={{fontSize:20,fontWeight:900,color:'#1e293b'}}>Orden de Trabajo #{detail.OT}</div>
                <div style={{fontSize:12,color:'#64748b',marginTop:3}}>{detail.Comercio}</div>
              </div>
              <button onClick={()=>setDetail(null)} style={{border:'none',background:'#f1f5f9',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontWeight:700,color:'#64748b'}}>✕</button>
            </div>
            {[
              ['Cuenta',detail.Cuenta],['Logística',detail.Logistica],['Estado',detail.Estado],
              ['Zona',detail.Zona],['Provincia',detail.ProvNorm],['Código Postal',detail.CP],
              ['Ciudad',detail.Ciudad],['Calle',detail.Calle],['Contacto',detail.Contacto],
              ['Horario',detail.Horario],['Estado Gestión',detail.GestionEstado],['Observaciones',detail.Obs],
            ].filter(([,v])=>v).map(([k,v])=>{
              const zc=ZONA_C[v]; const ec=ESTADO_C[v];
              return (
                <div key={k} style={{display:'flex',gap:14,padding:'9px 0',borderBottom:'1px solid #f8fafc',alignItems:'flex-start'}}>
                  <span style={{fontWeight:700,color:'#94a3b8',fontSize:10,minWidth:108,paddingTop:2,textTransform:'uppercase',letterSpacing:.6,flexShrink:0}}>{k}</span>
                  <span style={{color:'#1e293b',fontSize:13,flex:1,lineHeight:1.5}}>
                    {zc?<span style={{background:zc.bg,color:zc.text,border:`1px solid ${zc.bd}`,borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:700}}>{v}</span>
                      :ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 9px',fontSize:11,fontWeight:700}}>{v}</span>
                      :v}
                  </span>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

// ── DISTRIBUIDORES TAB ────────────────────────────────────────────────────────
// Paste this component into the main app

function DistribuidoresTab({ data, cpCoords }) {
  const [distribuidores, setDistribuidores] = useState([
    { id: 1, nombre: 'Distribuidora Mar del Plata', contacto: '', lat: -38.0023, lon: -57.5575, radio: 50, activo: true, direccion: 'Moreno 3630, Mar del Plata' }
  ]);
  const [selected, setSelected] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ nombre:'', direccion:'', radio:50 });
  const [geocoding, setGeocoding] = useState(false);
  const [otsModal, setOtsModal] = useState(null);

  function haversine(lat1,lon1,lat2,lon2) {
    const R=6371, dlat=(lat2-lat1)*Math.PI/180, dlon=(lon2-lon1)*Math.PI/180;
    const a=Math.sin(dlat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dlon/2)**2;
    return R*2*Math.asin(Math.sqrt(a));
  }

  function getOtsForDistri(distri, estadosExcluir=['Despachado','Extraviada']) {
    if (!distri.lat) return [];
    return data
      .filter(r => !estadosExcluir.includes(r.Estado))
      .map(r => {
        const m = r.CP?.match(/\d{4,5}/);
        if (!m) return null;
        const cpNum = parseInt(m[0]);
        const coords = cpCoords[cpNum];
        if (!coords) return null;
        const dist = haversine(distri.lat, distri.lon, coords[0], coords[1]);
        if (dist > distri.radio) return null;
        return { ...r, DistDistri: Math.round(dist*10)/10 };
      })
      .filter(Boolean)
      .sort((a,b) => a.DistDistri - b.DistDistri);
  }

  async function geocodeDir(dir) {
    setGeocoding(true);
    try {
      const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(dir+', Argentina')}&format=json&limit=1`;
      const res = await fetch(url);
      const json = await res.json();
      if (json[0]) return { lat: parseFloat(json[0].lat), lon: parseFloat(json[0].lon), display: json[0].display_name };
    } catch(e) {}
    finally { setGeocoding(false); }
    return null;
  }

  async function handleAddDistri() {
    if (!form.nombre || !form.direccion) return;
    setGeocoding(true);
    const geo = await geocodeDir(form.direccion);
    setGeocoding(false);
    if (!geo) { alert('No se pudo geocodificar la dirección. Verificá que sea correcta.'); return; }
    const nuevo = {
      id: Date.now(), nombre: form.nombre, direccion: form.direccion,
      lat: geo.lat, lon: geo.lon, radio: parseInt(form.radio)||50,
      activo: true, contacto: form.contacto || ''
    };
    setDistribuidores(prev => [...prev, nuevo]);
    setForm({ nombre:'', direccion:'', radio:50, contacto:'' });
    setShowForm(false);
  }

  function deleteDistri(id) {
    setDistribuidores(prev => prev.filter(d => d.id !== id));
    if (selected?.id === id) setSelected(null);
  }

  const ESTADO_C = {'Pendiente':'#f59e0b','En Proceso':'#3b82f6','Extraviada':'#ef4444','Despachado':'#10b981'};

  return (
    <div style={{padding:'0 20px 32px'}}>
      {/* Header */}
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:'#1e293b'}}>🚚 Distribuidores</div>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>Asignación de OTs por proximidad geográfica</div>
        </div>
        <button onClick={()=>setShowForm(!showForm)} style={{
          background:'#4f46e5',color:'#fff',border:'none',borderRadius:10,
          padding:'10px 18px',fontSize:13,fontWeight:700,cursor:'pointer'
        }}>+ Nuevo Distribuidor</button>
      </div>

      {/* Form nuevo distribuidor */}
      {showForm && (
        <div style={{background:'#f8fafc',borderRadius:16,padding:20,marginBottom:20,border:'2px solid #e0e7ff'}}>
          <div style={{fontWeight:800,color:'#1e293b',marginBottom:14,fontSize:14}}>Nuevo Distribuidor</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 2fr 1fr 1fr',gap:12,marginBottom:12}}>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5}}>NOMBRE</div>
              <input value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))}
                placeholder="Ej: Distribuidora MdP"
                style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5}}>DIRECCIÓN</div>
              <input value={form.direccion} onChange={e=>setForm(f=>({...f,direccion:e.target.value}))}
                placeholder="Ej: Moreno 3630, Mar del Plata"
                style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5}}>RADIO (km)</div>
              <input type="number" value={form.radio} onChange={e=>setForm(f=>({...f,radio:e.target.value}))}
                min={5} max={300}
                style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
            <div>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:5}}>CONTACTO</div>
              <input value={form.contacto||''} onChange={e=>setForm(f=>({...f,contacto:e.target.value}))}
                placeholder="Tel / email"
                style={{width:'100%',padding:'8px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,fontFamily:'inherit',boxSizing:'border-box'}}/>
            </div>
          </div>
          <div style={{display:'flex',gap:10}}>
            <button onClick={handleAddDistri} disabled={geocoding} style={{
              background:geocoding?'#94a3b8':'#4f46e5',color:'#fff',border:'none',borderRadius:9,
              padding:'9px 20px',fontSize:12,fontWeight:700,cursor:geocoding?'wait':'pointer'
            }}>{geocoding?'🔍 Geocodificando...':'✓ Guardar Distribuidor'}</button>
            <button onClick={()=>setShowForm(false)} style={{
              background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:9,
              padding:'9px 16px',fontSize:12,fontWeight:700,cursor:'pointer'
            }}>Cancelar</button>
          </div>
          <div style={{fontSize:11,color:'#94a3b8',marginTop:8}}>
            💡 La dirección se geocodifica automáticamente con OpenStreetMap. Usá el formato: Calle Número, Ciudad
          </div>
        </div>
      )}

      {/* Grid distribuidores */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(320px,1fr))',gap:16,marginBottom:24}}>
        {distribuidores.map(d => {
          const ots = getOtsForDistri(d);
          const porEstado = {};
          ots.forEach(r => { porEstado[r.Estado] = (porEstado[r.Estado]||0)+1; });
          const isSel = selected?.id === d.id;
          return (
            <div key={d.id} style={{
              background:isSel?'#f5f3ff':'#fff',
              borderRadius:16,padding:'18px 20px',
              border:isSel?'2px solid #4f46e5':'2px solid #e2e8f0',
              boxShadow:isSel?'0 4px 20px rgba(79,70,229,.15)':'0 2px 8px rgba(0,0,0,.06)',
              transition:'all .18s',cursor:'pointer',
            }} onClick={()=>setSelected(isSel?null:d)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:15,fontWeight:900,color:isSel?'#3730a3':'#1e293b'}}>{d.nombre}</div>
                  <div style={{fontSize:11,color:'#64748b',marginTop:3}}>📍 {d.direccion}</div>
                  {d.contacto && <div style={{fontSize:11,color:'#64748b'}}>📞 {d.contacto}</div>}
                  <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>Radio: {d.radio} km</div>
                </div>
                <button onClick={e=>{e.stopPropagation();deleteDistri(d.id);}} style={{
                  background:'#fee2e2',border:'none',color:'#ef4444',borderRadius:6,
                  padding:'4px 8px',fontSize:11,cursor:'pointer',fontWeight:700,marginLeft:8,flexShrink:0
                }}>✕</button>
              </div>

              <div style={{marginTop:14,display:'flex',gap:8,alignItems:'center'}}>
                <div style={{fontSize:28,fontWeight:900,color:isSel?'#4f46e5':'#1e293b'}}>{ots.length}</div>
                <div style={{fontSize:11,color:'#64748b',lineHeight:1.4}}>OTs a<br/>retirar</div>
                <div style={{flex:1,display:'flex',gap:5,flexWrap:'wrap',justifyContent:'flex-end'}}>
                  {Object.entries(porEstado).map(([e,n]) => (
                    <span key={e} style={{
                      background:(ESTADO_C[e]||'#94a3b8')+'22',color:ESTADO_C[e]||'#94a3b8',
                      border:`1px solid ${ESTADO_C[e]||'#94a3b8'}`,
                      borderRadius:99,padding:'2px 9px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'
                    }}>{e.split(' ')[0]}: {n}</span>
                  ))}
                </div>
              </div>

              <button onClick={e=>{e.stopPropagation();setOtsModal({distri:d,ots});}} style={{
                marginTop:12,width:'100%',background:isSel?'#4f46e5':'#f1f5f9',
                color:isSel?'#fff':'#475569',border:'none',borderRadius:9,
                padding:'9px',fontSize:12,fontWeight:700,cursor:'pointer'
              }}>Ver listado de OTs →</button>
            </div>
          );
        })}

        {distribuidores.length === 0 && (
          <div style={{gridColumn:'1/-1',textAlign:'center',padding:60,color:'#94a3b8'}}>
            <div style={{fontSize:40,marginBottom:12}}>🚚</div>
            <div style={{fontWeight:700,fontSize:16}}>No hay distribuidores cargados</div>
            <div style={{fontSize:13,marginTop:4}}>Hacé clic en "+ Nuevo Distribuidor" para agregar el primero</div>
          </div>
        )}
      </div>

      {/* Modal OTs del distribuidor */}
      {otsModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(10,8,35,.65)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:16}}
          onClick={()=>setOtsModal(null)}>
          <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:920,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 28px 90px rgba(0,0,0,.4)',overflow:'hidden'}}
            onClick={e=>e.stopPropagation()}>

            {/* Header */}
            <div style={{background:'linear-gradient(135deg,#0f0c29,#312e81)',padding:'20px 28px',color:'#fff',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
                <div>
                  <div style={{fontSize:20,fontWeight:900}}>🚚 {otsModal.distri.nombre}</div>
                  <div style={{fontSize:12,color:'#a5b4fc',marginTop:3}}>📍 {otsModal.distri.direccion} · Radio {otsModal.distri.radio} km</div>
                  <div style={{fontSize:12,color:'#a5b4fc'}}>{otsModal.ots.length} OTs a retirar (Pendiente + En Proceso)</div>
                </div>
                <button onClick={()=>setOtsModal(null)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',cursor:'pointer',fontWeight:700}}>✕ Cerrar</button>
              </div>
            </div>

            {/* Tabla */}
            <div style={{overflowY:'auto',flex:1}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead style={{position:'sticky',top:0,background:'#f8fafc',zIndex:1}}>
                  <tr>
                    {['Dist.','OT','Comercio','Estado','CP','Ciudad','Calle','Contacto','Horario'].map(h=>(
                      <th key={h} style={{padding:'10px 12px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {otsModal.ots.map((r,i) => {
                    const ec = ESTADO_C[r.Estado];
                    return (
                      <tr key={i} style={{borderBottom:'1px solid #f1f5f9',background:i%2===0?'#fff':'#fafafa'}}>
                        <td style={{padding:'9px 12px',fontWeight:800,color:'#4f46e5',whiteSpace:'nowrap',fontSize:11}}>{r.DistDistri} km</td>
                        <td style={{padding:'9px 12px',fontWeight:800,color:'#4f46e5',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                        <td style={{padding:'9px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.Comercio}>{r.Comercio}</td>
                        <td style={{padding:'9px 12px'}}><span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>{r.Estado}</span></td>
                        <td style={{padding:'9px 12px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                        <td style={{padding:'9px 12px',color:'#475569'}}>{r.Ciudad}</td>
                        <td style={{padding:'9px 12px',color:'#64748b',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.DireccionFormula}>{r.DireccionFormula||r.Calle}</td>
                        <td style={{padding:'9px 12px',color:'#475569',whiteSpace:'nowrap'}}>{r.Contacto}</td>
                        <td style={{padding:'9px 12px',color:'#94a3b8',fontSize:11,whiteSpace:'nowrap'}}>{r.Horario}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ── MAIN ──────────────────────────────────────────────────────────────────────
function App() {
  const [data, setData] = useState(FALLBACK_DATA);
  const [syncStatus, setSyncStatus] = useState('loading');
  const [selectedSector, setSelectedSector] = useState(null);
  const [estadoF, setEstadoF] = useState('Todos');
  const [zonaF, setZonaF] = useState('Todas');
  const [logF, setLogF] = useState('Todas');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);
  const [sinCpModal, setSinCpModal] = useState(false);
  const [activeTab, setActiveTab] = useState('dashboard');
  const PAGE = 50;

  useEffect(() => {
    fetch(SHEET_CSV)
      .then(r=>r.text())
      .then(csv=>{
        const lines=csv.split('\n').filter(l=>l.trim());
        if(lines.length<2){setSyncStatus('fallback');return;}
        const heads=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
        const rows=lines.slice(1).map(line=>{
          const vals=[]; let cur='',inQ=false;
          for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else{cur+=ch;}}
          vals.push(cur.trim());
          const obj={};
          heads.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});
          return obj;
        });
        if(rows.length>5){
          const mapped=rows.map(r=>{
            const pn=normProv(r.Provincia_limpia||r.Provincia||r.b||'');
            const zona=r.Categoria_Zona__c||r.Zona||'Sin Zona';
            return {
              OT:r.WorkOrderNumber||r.OT||'',Comercio:r.Nombre_del_comercio__c||r.Comercio||'',
              Cuenta:r['Account.Name']||r.Cuenta||'',Logistica:r.Logistica__c||r.Logistica||'',
              Estado:r.Status||r.Estado||'',Zona:zona,
              Provincia:r.Provincia_limpia||r.Provincia||r.b||'',CP:r.CP_extraido||r.CP||'',
              Ciudad:r.Direcci_n_de_env_o__City__s||r.Ciudad||'',
              Calle:r.Direcci_n_de_env_o__Street__s||r.Calle||'',
              Contacto:r.Contacto__c||r.Contacto||'',Horario:r.Horario__c||r.Horario||'',
              GestionEstado:r.Status_Gestion_Retiros__c||r.GestionEstado||'',
              Obs:r.Observaciones__c||r.Obs||'',
              ProvNorm:pn, Sector:getSector(pn,zona),
            };
          });
          setData(mapped); setSyncStatus('live');
        } else setSyncStatus('fallback');
      }).catch(()=>setSyncStatus('fallback'));
  },[]);

  const logisticas = useMemo(()=>['Todas',...Array.from(new Set(data.map(r=>r.Logistica).filter(Boolean))).sort()],[data]);

  const filtered = useMemo(()=>data.filter(r=>{
    if(estadoF!=='Todos'&&r.Estado!==estadoF) return false;
    if(zonaF!=='Todas'&&r.Zona!==zonaF) return false;
    if(logF!=='Todas'&&r.Logistica!==logF) return false;
    if(search){const q=search.toLowerCase();return r.OT?.includes(q)||r.Comercio?.toLowerCase().includes(q)||r.Provincia?.toLowerCase().includes(q)||r.Ciudad?.toLowerCase().includes(q)||r.CP?.toLowerCase().includes(q);}
    return true;
  }),[data,estadoF,zonaF,logF,search]);

  // Sectores ordenados de mayor a menor
  const sectorStats = useMemo(()=>{
    const c={};
    filtered.forEach(r=>{
      const s=r.Sector||'Sin dato';
      if(s==='Sin dato') return;
      if(!c[s]) c[s]={total:0,Pendiente:0,'En Proceso':0,Extraviada:0,Despachado:0};
      c[s].total++;
      if(c[s][r.Estado]!==undefined) c[s][r.Estado]++;
    });
    return Object.entries(c).sort((a,b)=>b[1].total-a[1].total);
  },[filtered]);

  const maxCount = sectorStats[0]?.[1]?.total || 1;
  const sectorOTs = useMemo(()=>selectedSector?filtered.filter(r=>r.Sector===selectedSector):[],[filtered,selectedSector]);
  const paged = filtered.slice(page*PAGE,(page+1)*PAGE);
  const totalPages = Math.ceil(filtered.length/PAGE);

  const Btn = ({items,cur,set,colors})=>items.map(v=>(
    <button key={v} onClick={()=>{set(v);setPage(0);}} style={{
      padding:'5px 12px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',
      background:cur===v?(colors?colors[v]||'#4f46e5':'#4f46e5'):'#f0f2f8',
      color:cur===v?'#fff':'#64748b',transition:'all .15s'
    }}>{v}</button>
  ));

  const kpis=[
    {label:'TOTAL',value:filtered.length,color:'#6366f1'},
    {label:'PENDIENTES',value:filtered.filter(r=>r.Estado==='Pendiente').length,color:'#f59e0b'},
    {label:'EN PROCESO',value:filtered.filter(r=>r.Estado==='En Proceso').length,color:'#3b82f6'},
    {label:'EXTRAVIADAS',value:filtered.filter(r=>r.Estado==='Extraviada').length,color:'#ef4444'},
    {label:'DESPACHADAS',value:filtered.filter(r=>r.Estado==='Despachado').length,color:'#10b981'},
  ];

  // Special styling for BsAs rows
  const isBA = s => s?.startsWith('Buenos Aires');

  return (
    <div style={{minHeight:'100vh',background:'#eef1f7',fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>

      {/* HEADER */}
      <div style={{background:'linear-gradient(135deg,#0a0720 0%,#1e1b4b 55%,#3730a3 100%)',padding:'18px 28px 22px',boxShadow:'0 4px 24px rgba(0,0,0,.3)'}}>
        <div style={{maxWidth:1380,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:18}}>
            <div>
              <div style={{fontSize:21,fontWeight:900,color:'#fff',letterSpacing:-.5}}>📦 Desinstalaciones · Marzo 2026 <span style={{fontSize:11,fontWeight:500,color:'#818cf8',letterSpacing:0}}>v1.0</span></div>
              <div style={{fontSize:11,marginTop:4,display:'flex',alignItems:'center',gap:8}}>
                <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',flexShrink:0,
                  background:syncStatus==='live'?'#10b981':syncStatus==='loading'?'#f59e0b':'#64748b',
                  boxShadow:syncStatus==='live'?'0 0 8px #10b981':'none'}}/>
                <span style={{color:'#a5b4fc'}}>
                  {syncStatus==='live'?`✅ Sincronizado desde Google Drive · ${data.length} OTs`:
                   syncStatus==='loading'?'🔄 Conectando con Drive...':
                   `📋 Datos locales · ${data.length} OTs`}
                </span>
              </div>
            </div>
            <a href={SHEET_LINK} target="_blank" rel="noreferrer" style={{background:'rgba(255,255,255,.1)',color:'#c7d2fe',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'8px 16px',fontSize:12,fontWeight:700,textDecoration:'none'}}>🔗 Google Drive</a>
          </div>
          {/* Tab Nav */}
          <div style={{display:'flex',gap:8,marginTop:14}}>
            {[['dashboard','📊 Dashboard'],['distribuidores','🚚 Distribuidores']].map(([t,label])=>(
              <button key={t} onClick={()=>setActiveTab(t)} style={{
                padding:'8px 18px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
                background:activeTab===t?'rgba(255,255,255,.2)':'rgba(255,255,255,.07)',
                color:activeTab===t?'#fff':'#a5b4fc',
                borderBottom:activeTab===t?'2px solid #818cf8':'2px solid transparent',
              }}>{label}</button>
            ))}
          </div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {kpis.map(k=>(
              <div key={k.label} style={{background:'rgba(255,255,255,.07)',backdropFilter:'blur(10px)',borderRadius:14,padding:'14px 20px',borderLeft:`3px solid ${k.color}`,flex:1,minWidth:110}}>
                <div style={{fontSize:28,fontWeight:900,color:k.color,lineHeight:1}}>{k.value}</div>
                <div style={{fontSize:10,color:'rgba(255,255,255,.55)',marginTop:4,fontWeight:700,letterSpacing:.8}}>{k.label}</div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {activeTab==='distribuidores' && <DistribuidoresTab data={filtered} cpCoords={CP_COORDS}/>}
      {activeTab==='dashboard' && <div style={{display:'none'}}/>}
      <div style={{maxWidth:1380,margin:'0 auto',padding:'22px 20px',display: activeTab==='dashboard' ? 'grid' : 'none',gridTemplateColumns:'360px 1fr',gap:20,alignItems:'start'}}>

        {/* PANEL PROVINCIAS */}
        <div style={{position:'sticky',top:20}}>
          <div style={{background:'#fff',borderRadius:20,padding:'20px 18px',boxShadow:'0 2px 16px rgba(0,0,0,.07)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <div style={{fontWeight:900,color:'#1e293b',fontSize:15}}>Provincias / Regiones</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>Ordenadas por cantidad de OTs · clic para detalle</div>
              </div>
              {selectedSector && (
                <button onClick={()=>setSelectedSector(null)} style={{fontSize:11,fontWeight:700,color:'#6366f1',background:'#ede9fe',border:'none',borderRadius:8,padding:'5px 10px',cursor:'pointer'}}>✕ Limpiar</button>
              )}
            </div>

            <div style={{maxHeight:580,overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:'2px solid #e2e8f0'}}>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8',width:24}}>#</th>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8'}}>PROVINCIA / REGIÓN</th>
                    <th style={{padding:'5px 6px',textAlign:'right',fontSize:10,fontWeight:700,color:'#94a3b8',width:40}}>OTs</th>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8',width:80}}>ESTADOS</th>
                  </tr>
                </thead>
                <tbody>
                  {sectorStats.map(([sector, stats], idx) => {
                    const isSel = selectedSector === sector;
                    const baStyle = isBA(sector);
                    const pct = Math.round((stats.total / maxCount) * 100);
                    const rowBg = isSel ? '#ede9fe' : 'transparent';
                    return (
                      <tr key={sector}
                        onClick={()=>setSelectedSector(isSel?null:sector)}
                        style={{cursor:'pointer',background:rowBg,borderBottom:'1px solid #f1f5f9'}}
                        onMouseEnter={e=>{ if(!isSel) e.currentTarget.style.background='#f8fafc'; }}
                        onMouseLeave={e=>{ if(!isSel) e.currentTarget.style.background='transparent'; }}>
                        <td style={{padding:'8px 6px',fontSize:11,fontWeight:700,color:isSel?'#4f46e5':'#94a3b8',verticalAlign:'top'}}>
                          {idx+1}
                        </td>
                        <td style={{padding:'8px 6px',verticalAlign:'top'}}>
                          <div style={{fontSize:13,fontWeight:700,color:isSel?'#3730a3':baStyle?'#5b21b6':'#1e293b',marginBottom:5,lineHeight:1.3}}>
                            {baStyle
                              ? <span><span style={{fontSize:10,fontWeight:400,color:'#94a3b8'}}>Bs As · </span>{sector.split('— ')[1]}</span>
                              : sector}
                          </div>
                          <div style={{height:4,borderRadius:2,background:'#e2e8f0'}}>
                            <div style={{height:'100%',width:pct+'%',minWidth:4,borderRadius:2,background:isSel?'#4f46e5':baStyle?'#8b5cf6':'#818cf8'}}/>
                          </div>
                        </td>
                        <td style={{padding:'8px 6px',textAlign:'right',fontSize:18,fontWeight:900,color:isSel?'#4f46e5':baStyle?'#6d28d9':'#334155',verticalAlign:'top',whiteSpace:'nowrap'}}>
                          {stats.total}
                        </td>
                        <td style={{padding:'8px 6px',verticalAlign:'top'}}>
                          {[['P',stats.Pendiente,'#f59e0b'],['EP',stats['En Proceso'],'#3b82f6'],['EX',stats.Extraviada,'#ef4444'],['D',stats.Despachado,'#10b981']]
                            .filter(([,v])=>v>0).map(([lbl,val,col])=>(
                            <div key={lbl} style={{fontSize:10,fontWeight:700,color:col,whiteSpace:'nowrap',lineHeight:1.7}}>
                              <span style={{background:col+'22',borderRadius:3,padding:'0 4px',marginRight:3}}>{lbl}</span>{val}
                            </div>
                          ))}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        {/* PANEL SIN CP */}
        {(() => {
          const sinCp = filtered.filter(r => !r.CP);
          if (sinCp.length === 0) return null;
          const sinProv = sinCp.filter(r => !r.Provincia || r.Provincia === 'Sin dato');
          const conTexto = sinCp.filter(r => r.Provincia && r.Provincia !== 'Sin dato');
          return (
            <div style={{background:'#fffbeb',borderRadius:20,padding:'16px 18px',boxShadow:'0 2px 16px rgba(0,0,0,.07)',marginBottom:16,border:'1px solid #fcd34d'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16}}>⚠️</span>
                  <div>
                    <div style={{fontWeight:900,color:'#92400e',fontSize:13}}>Sin Código Postal</div>
                    <div style={{fontSize:11,color:'#b45309',marginTop:1}}>{sinCp.length} OTs sin CP · no se puede calcular distancia</div>
                  </div>
                </div>
                <button onClick={()=>setSinCpModal(true)} style={{
                  background:'#f59e0b',color:'#fff',border:'none',borderRadius:9,
                  padding:'7px 14px',fontSize:11,fontWeight:800,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:5
                }}>👁 Ver listado</button>
              </div>
              <div style={{display:'flex',gap:8}}>
                <div style={{flex:1,background:'#fef3c7',borderRadius:10,padding:'10px 14px',border:'1px solid #fcd34d'}}>
                  <div style={{fontSize:22,fontWeight:900,color:'#d97706'}}>{sinProv.length}</div>
                  <div style={{fontSize:10,color:'#92400e',fontWeight:700,marginTop:2}}>SIN PROVINCIA NI CP</div>
                  <div style={{fontSize:10,color:'#b45309',marginTop:2}}>Verificación manual</div>
                </div>
                <div style={{flex:1,background:'#fff7ed',borderRadius:10,padding:'10px 14px',border:'1px solid #fed7aa'}}>
                  <div style={{fontSize:22,fontWeight:900,color:'#ea580c'}}>{conTexto.length}</div>
                  <div style={{fontSize:10,color:'#92400e',fontWeight:700,marginTop:2}}>CON PROVINCIA SIN CP</div>
                  <div style={{fontSize:10,color:'#b45309',marginTop:2}}>Ej: "ESCOBAR", "Bahía Blanca"</div>
                </div>
              </div>
            </div>
          );
        })()}

        {/* PANEL TABLA */}
        <div>
          <div style={{background:'#fff',borderRadius:18,padding:'16px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',marginBottom:16}}>
            <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>ZONA</div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><Btn items={['Todas','CABA','GBA','PBA','INTERIOR','Sin Zona']} cur={zonaF} set={setZonaF}/></div>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>ESTADO</div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><Btn items={['Todos','Pendiente','En Proceso','Extraviada','Despachado']} cur={estadoF} set={setEstadoF} colors={ESTADO_C}/></div>
              </div>
              <div style={{marginLeft:'auto'}}>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>BUSCAR</div>
                <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="OT, comercio, provincia, CP..."
                  style={{padding:'7px 13px',borderRadius:9,border:'1px solid #e2e8f0',fontSize:12,width:230,fontFamily:'inherit',outline:'none'}}/>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>LOGÍSTICA</div>
              <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><Btn items={logisticas} cur={logF} set={setLogF}/></div>
            </div>
          </div>

          <div style={{background:'#fff',borderRadius:18,boxShadow:'0 2px 12px rgba(0,0,0,.06)',overflow:'hidden'}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:800,color:'#1e293b',fontSize:14}}>
                {selectedSector ? <><span style={{color:'#6366f1'}}>📍 {selectedSector}</span> · </> : ''}{filtered.length} Órdenes de Trabajo
              </span>
              <span style={{fontSize:11,color:'#94a3b8'}}>Pág {page+1}/{totalPages||1} · Clic en fila para detalle</span>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#f8fafc'}}>
                    {['Orden de Trabajo','Comercio','Logística','Estado','Zona','Provincia','CP','Ciudad'].map(h=>(
                      <th key={h} style={{padding:'9px 14px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {paged.map((r,i)=>{
                    const zc=ZONA_C[r.Zona]; const ec=ESTADO_C[r.Estado];
                    return (
                      <tr key={i} onClick={()=>setSelectedSector(r.Sector)} style={{borderBottom:'1px solid #f8fafc',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                        onMouseLeave={e=>e.currentTarget.style.background=''}>
                        <td style={{padding:'9px 14px',fontWeight:800,color:'#4f46e5',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                        <td style={{padding:'9px 14px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.Comercio}>{r.Comercio}</td>
                        <td style={{padding:'9px 14px',color:'#64748b'}}>{r.Logistica}</td>
                        <td style={{padding:'9px 14px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>{r.Estado}</span>:r.Estado}</td>
                        <td style={{padding:'9px 14px'}}>{zc?<span style={{background:zc.bg,color:zc.text,border:`1px solid ${zc.bd}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Zona}</span>:r.Zona}</td>
                        <td style={{padding:'9px 14px',color:'#475569'}}>{r.ProvNorm}</td>
                        <td style={{padding:'9px 14px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                        <td style={{padding:'9px 14px',color:'#64748b'}}>{r.Ciudad}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {totalPages>1&&(
              <div style={{display:'flex',gap:6,padding:'12px 20px',borderTop:'1px solid #f1f5f9',justifyContent:'center',alignItems:'center'}}>
                {[['«',0],['‹',Math.max(0,page-1)],null,['›',Math.min(totalPages-1,page+1)],['»',totalPages-1]].map((item,i)=>
                  item===null
                    ?<span key={i} style={{fontSize:12,color:'#94a3b8',padding:'0 8px'}}>{page+1} / {totalPages}</span>
                    :<button key={i} onClick={()=>setPage(item[1])} style={{padding:'6px 11px',borderRadius:7,border:'1px solid #e2e8f0',cursor:'pointer',background:'#fff',color:'#64748b'}}>{item[0]}</button>
                )}
              </div>
            )}
          </div>
        </div>
      </div>


      {sinCpModal && (() => {
        const sinCp = data.filter(r => !r.CP);
        return (
          <div style={{position:'fixed',inset:0,background:'rgba(10,8,35,.65)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:16}} onClick={()=>setSinCpModal(false)}>
            <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:900,maxHeight:'90vh',display:'flex',flexDirection:'column',boxShadow:'0 28px 90px rgba(0,0,0,.4)',overflow:'hidden'}} onClick={e=>e.stopPropagation()}>
              <div style={{background:'linear-gradient(135deg,#78350f,#b45309)',padding:'20px 28px',color:'#fff',flexShrink:0}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <div>
                    <div style={{fontSize:20,fontWeight:900}}>⚠️ OTs sin Código Postal</div>
                    <div style={{fontSize:12,color:'#fde68a',marginTop:4}}>{sinCp.length} registros · Descargar el Excel para completar manualmente</div>
                  </div>
                  <button onClick={()=>setSinCpModal(false)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',cursor:'pointer',fontWeight:700}}>✕ Cerrar</button>
                </div>
                <div style={{display:'flex',gap:8,marginTop:12}}>
                  <span style={{background:'rgba(255,255,255,.15)',borderRadius:99,padding:'3px 12px',fontSize:11,fontWeight:700,border:'1px solid rgba(255,255,255,.3)'}}>
                    🔴 {sinCp.filter(r=>!r.Provincia||r.Provincia==='Sin dato').length} sin ningún dato
                  </span>
                  <span style={{background:'rgba(255,255,255,.15)',borderRadius:99,padding:'3px 12px',fontSize:11,fontWeight:700,border:'1px solid rgba(255,255,255,.3)'}}>
                    🟡 {sinCp.filter(r=>r.Provincia&&r.Provincia!=='Sin dato').length} con provincia sin CP
                  </span>
                </div>
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                  <thead style={{position:'sticky',top:0,background:'#fffbeb',zIndex:1}}>
                    <tr>
                      {['OT','Comercio','Logística','Estado','Zona','Dirección','Localidad','Provincia (raw)','Gestión'].map(h=>(
                        <th key={h} style={{padding:'10px 14px',textAlign:'left',fontWeight:700,color:'#92400e',borderBottom:'2px solid #fcd34d',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {sinCp.map((r,i)=>{
                      const noData = !r.Provincia || r.Provincia==='Sin dato';
                      const ec = ESTADO_C[r.Estado];
                      return (
                        <tr key={i} style={{borderBottom:'1px solid #fef3c7',background:noData?'#fef9c3':i%2===0?'#fffbeb':'#fff'}}>
                          <td style={{padding:'9px 14px',fontWeight:800,color:'#d97706',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                          <td style={{padding:'9px 14px',maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.Comercio}>{r.Comercio}</td>
                          <td style={{padding:'9px 14px',color:'#64748b',fontSize:11}}>{r.Logistica}</td>
                          <td style={{padding:'9px 14px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Estado}</span>:r.Estado}</td>
                          <td style={{padding:'9px 14px',color:'#64748b',fontSize:11}}>{r.Zona}</td>
                          <td style={{padding:'9px 14px',color:'#475569',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.DireccionFormula}>{r.DireccionFormula}</td>
                          <td style={{padding:'9px 14px',color:'#475569'}}>{r.Localidad}</td>
                          <td style={{padding:'9px 14px',color:noData?'#ef4444':'#92400e',fontWeight:noData?700:400,fontSize:11}}>{noData?'⚠ Sin dato':r.Provincia}</td>
                          <td style={{padding:'9px 14px',color:'#94a3b8',fontSize:11,maxWidth:140,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.GestionEstado}</td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        );
      })()}

      {activeTab==='dashboard' && selectedSector && sectorOTs.length>0 && (
        <ProvModal sector={selectedSector} ots={sectorOTs} onClose={()=>setSelectedSector(null)}/>
      )}
    </div>
  );
}

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App/>);
  </script>
</body>
</html>
