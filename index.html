  );
}


// ─── IMPORTAR TAB ─────────────────────────────────────────────
function ImportarTab({webhookUrl}){
  const [step, setStep] = React.useState('idle'); // idle | reading | preview | importing | done | backups
  const [exitosas, setExitosas] = React.useState([]);
  const [todasDesins, setTodasDesins] = React.useState([]);
  const [matchExitosos, setMatchExitosos] = React.useState([]);
  const [fileName, setFileName] = React.useState('');
  const [result, setResult] = React.useState(null);
  const [error, setError] = React.useState('');
  const [sheetData, setSheetData] = React.useState(null);
  const [backups, setBackups] = React.useState([]);
  const [restoring, setRestoring] = React.useState(false);

  // URL hardcodeada de Hoja13 como CSV
  const HOJA13_CSV_URL = 'https://docs.google.com/spreadsheets/d/1PHrJMqAeZamdmZJuCebgPBJd-fGQtdmm/gviz/tq?tqx=out:csv&gid=1843553678';

  const BACKUP_KEY = 'alleata_backups';

  // Cargar lista de backups desde localStorage
  function loadBackups(){
    try{
      const raw = localStorage.getItem(BACKUP_KEY);
      return raw ? JSON.parse(raw) : [];
    }catch(e){ return []; }
  }

  // Guardar backup del CSV actual de Hoja13
  async function makeBackup(csvText, importFileName){
    const now = new Date();
    const label = now.toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
    const backup = {
      id: now.getTime(),
      fecha: label,
      archivo: importFileName,
      csv: csvText
    };
    try{
      const existing = loadBackups();
      // Máximo 10 backups
      const updated = [backup, ...existing].slice(0,10);
      localStorage.setItem(BACKUP_KEY, JSON.stringify(updated));
      return true;
    }catch(e){
      console.warn('No se pudo guardar backup (localStorage lleno?):', e);
      return false;
    }
  }

  // Restaurar un backup enviando el CSV al webhook
  async function handleRestore(backup){
    if(!webhookUrl){ setError('Configurá el webhook en Config'); return; }
    if(!confirm(`¿Restaurar el backup del ${backup.fecha}? Esto va a sobreescribir el estado actual de Hoja13.`)) return;
    setRestoring(true);
    try{
      await fetch(webhookUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'restoreBackup', csv: backup.csv}),
        mode:'no-cors'
      });
      alert(`Restore del ${backup.fecha} enviado. Revisá Apps Script para confirmar.`);
    }catch(e){
      setError('Error al restaurar: ' + e.message);
    }
    setRestoring(false);
  }

  React.useEffect(()=>{
    setBackups(loadBackups());
  },[]);

  function readXlsx(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = new Uint8Array(e.target.result);
          const wb = XLSX.read(data, {type:'array'});
          const ws = wb.Sheets[wb.SheetNames[0]];
          const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
          resolve(rows);
        } catch(err){ reject(err); }
      };
      reader.readAsArrayBuffer(file);
    });
  }

  async function handleFile(e){
    const file = e.target.files[0];
    if(!file) return;
    setFileName(file.name);
    setStep('reading');
    setError('');
    try {
      const rows = await readXlsx(file);

      // 1. Solo Desinstalaciones
      const desins = rows.filter(r =>
        String(r.record_type_name_clickup__c||'').trim() === 'Desinstalación'
      );

      // 2. Exitosos de Desinstalación
      const exitososNros = desins
        .filter(r => String(r.Status||'').trim() === 'Exitoso')
        .map(r => String(r.WorkOrderNumber||'').replace(/^0+/,'').trim())
        .filter(Boolean);

      setExitosas(exitososNros);
      setTodasDesins(desins);

      // 3. Cargar Hoja13 para cruce cliente-side
      try{
          const resp = await fetch(HOJA13_CSV_URL);
          const text = await resp.text();
          // Parsear CSV simple
          const lines = text.split('\n').filter(Boolean);
          const headers = lines[0].replace(/"/g,'').split(',');
          const wonIdx = headers.findIndex(h=>h.trim()==='WorkOrderNumber');
          const statusIdx = headers.findIndex(h=>h.trim()==='Status');
          if(wonIdx>=0){
            const hoja13 = lines.slice(1).map(l=>{
              const cols = l.replace(/"/g,'').split(',');
              return {
                won: String(cols[wonIdx]||'').replace(/^0+/,'').trim(),
                status: String(cols[statusIdx]||'').trim()
              };
            });
            setSheetData(hoja13);
            // Calcular los que matchean como Exitoso
            const hoja13Map = {};
            hoja13.forEach(r=>{ hoja13Map[r.won]=r.status; });
            const matches = exitososNros.filter(won => hoja13Map[won] && hoja13Map[won]!=='Exitoso');
            setMatchExitosos(matches);
          }
        }catch(err){
          // Si falla el fetch del sheet, igual mostramos el preview sin cruce
          setSheetData(null);
          setMatchExitosos([]);
        }

      setStep('preview');
    } catch(err){
      setError('Error leyendo el archivo: ' + err.message);
      setStep('idle');
    }
    e.target.value = '';
  }

  async function handleImport(){
    if(!webhookUrl){ setError('Configurá el webhook en la pestaña Config'); return; }
    setStep('importing');
    setError('');
    try {
      // 1. Hacer backup del estado actual de Hoja13 ANTES de importar
      try{
        const respBkp = await fetch(HOJA13_CSV_URL);
        const csvText = await respBkp.text();
        await makeBackup(csvText, fileName);
        setBackups(loadBackups());
      }catch(e){
        console.warn('Backup fallido, continuando igual:', e);
      }

      // 2. Importar — envía TODAS las desinstalaciones con su estado actual
      const rowsParaImportar = todasDesins.map(r => ({
        won: String(r.WorkOrderNumber||'').replace(/^0+/,'').trim(),
        status: String(r.Status||'').trim(),
        logistica: String(r.Logistica__c||'').trim(),
        nombre: String(r.Nombre_del_comercio__c||'').trim(),
      })).filter(r => r.won);

      // Enviar via GET en chunks (no-cors no soporta POST con body en Apps Script)
      const chunkSize = 50;
      for(let i = 0; i < rowsParaImportar.length; i += chunkSize){
        const chunk = rowsParaImportar.slice(i, i + chunkSize);
        const params = new URLSearchParams({
          action: 'importChunk',
          rows: JSON.stringify(chunk)
        });
        await fetch(`${webhookUrl}?${params.toString()}`, {
          method: 'GET',
          mode: 'no-cors',
        });
      }
      setResult({
        actualizadas: cambiosEstado.length || '?',
        totalXlsx: todasDesins.length,
        totalDesins: todasDesins.length
      });
      setStep('done');
    } catch(err){
      setError('Error de conexión: ' + err.message);
      setStep('preview');
    }
  }

  // Contadores preview
  const totalDesinsXlsx = todasDesins.length;
  const totalExitososDesins = exitosas.length;
  const totalNoExitosos = todasDesins.filter(r=>String(r.Status||'').trim()!=='Exitoso').length;
  const aActualizar = matchExitosos.length;

  // Calcular cambios de estado y proyección de indicadores si tenemos sheetData
  const cambiosEstado = React.useMemo(()=>{
    if(!sheetData || !todasDesins.length) return [];
    const nuevaMap = {};
    todasDesins.forEach(r=>{
      const won = String(r.WorkOrderNumber||'').replace(/^0+/,'').trim();
      nuevaMap[won] = String(r.Status||'').trim();
    });
    const conteo = {};
    sheetData.forEach(({won, status: statusViejo})=>{
      const statusNuevo = nuevaMap[won];
      if(statusNuevo && statusNuevo !== statusViejo){
        const key = statusViejo + '→' + statusNuevo;
        conteo[key] = (conteo[key]||0) + 1;
      }
    });
    return Object.entries(conteo).map(([k,v])=>{
      const [de,a] = k.split('→');
      return {de, a, cant:v};
    }).sort((x,y)=>y.cant-x.cant);
  },[sheetData, todasDesins]);

  const proyeccion = React.useMemo(()=>{
    if(!sheetData || !todasDesins.length) return null;
    const nuevaMap = {};
    todasDesins.forEach(r=>{
      const won = String(r.WorkOrderNumber||'').replace(/^0+/,'').trim();
      nuevaMap[won] = String(r.Status||'').trim();
    });
    // Estado final de cada OT en base
    const estadoFinal = {};
    sheetData.forEach(({won, status})=>{
      estadoFinal[won] = nuevaMap[won] || status;
    });
    // Nuevos no exitosos
    const baseSet = new Set(sheetData.map(r=>r.won));
    todasDesins.forEach(r=>{
      const won = String(r.WorkOrderNumber||'').replace(/^0+/,'').trim();
      const st = String(r.Status||'').trim();
      if(!baseSet.has(won) && st !== 'Exitoso') estadoFinal[won] = st;
    });
    const cnt = {};
    Object.values(estadoFinal).forEach(s=>{ cnt[s]=(cnt[s]||0)+1; });
    return cnt;
  },[sheetData, todasDesins]);

  // KPIs actuales del dashboard
  const kpisHoy = React.useMemo(()=>{
    if(!sheetData) return null;
    const cnt = {};
    sheetData.forEach(({status})=>{ cnt[status]=(cnt[status]||0)+1; });
    return cnt;
  },[sheetData]);

  return(
    <div style={{maxWidth:720,margin:'0 auto',padding:'32px 20px'}}>
      <div style={{background:'#fff',borderRadius:20,boxShadow:'0 4px 24px rgba(10,37,64,.08)',overflow:'hidden'}}>
        {/* Header */}
        <div style={{background:'linear-gradient(135deg,#0A2540,#063D52)',padding:'24px 28px',color:'#fff'}}>
          <div style={{fontSize:22,fontWeight:900,color:'#5eead4'}}>📥 Importar Desinstalaciones desde Salesforce</div>
          <div style={{fontSize:13,color:'#99f6e4',marginTop:4}}>Solo procesa Desinstalaciones · Marca como Exitoso las que ya existen en Hoja13</div>
        </div>

        <div style={{padding:'28px'}}>

          {error && <div style={{background:'#fee2e2',border:'1px solid #fca5a5',borderRadius:10,padding:'12px 14px',fontSize:13,color:'#991b1b',marginBottom:16}}>❌ {error}</div>}

          {/* IDLE */}
          {(step==='idle'||step==='reading') && (
            <div>
              <div style={{background:'#f0fdf4',border:'2px dashed #86efac',borderRadius:16,padding:'32px',textAlign:'center',marginBottom:20}}>
                <div style={{fontSize:40,marginBottom:12}}>📂</div>
                <div style={{fontSize:15,fontWeight:700,color:'#166534',marginBottom:8}}>Seleccioná el xlsx exportado desde Salesforce</div>
                <div style={{fontSize:12,color:'#16a34a',marginBottom:20}}>Se filtran solo las Desinstalaciones · Se actualizan a Exitoso las que están en Hoja13</div>
                <label style={{display:'inline-block',background:'#16a34a',color:'#fff',borderRadius:10,padding:'10px 24px',fontSize:14,fontWeight:700,cursor:step==='reading'?'wait':'pointer'}}>
                  {step==='reading' ? '⏳ Leyendo archivo...' : '📁 Elegir archivo .xlsx'}
                  <input type="file" accept=".xlsx,.xls" onChange={handleFile} style={{display:'none'}} disabled={step==='reading'}/>
                </label>
              </div>
              <div style={{background:'#fef9c3',border:'1px solid #fde047',borderRadius:12,padding:'14px 16px',fontSize:13,color:'#854d0e'}}>
                ⚠️ <strong>Cómo funciona:</strong> se filtran solo las filas de tipo <strong>Desinstalación</strong>, luego se identifican las que figuran como <strong>Exitoso</strong> en el xlsx y existen en Hoja13 — esas son las que se van a actualizar.
              </div>
              {backups.length > 0 && (
                <button onClick={()=>setStep('backups')} style={{marginTop:12,width:'100%',background:'#f1f5f9',color:'#475569',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px',fontSize:13,fontWeight:700,cursor:'pointer'}}>
                  🗂 Ver historial de backups ({backups.length})
                </button>
              )}
            </div>
          )}

          {/* PREVIEW */}
          {step==='preview' && (
            <div>
              {/* Archivo */}
              <div style={{fontSize:12,color:'#64748b',fontWeight:600,marginBottom:14}}>📄 {fileName}</div>

              {/* KPIs del xlsx */}
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12,marginBottom:20}}>
                <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,padding:'14px 16px',textAlign:'center'}}>
                  <div style={{fontSize:26,fontWeight:900,color:'#0A2540'}}>{totalDesinsXlsx.toLocaleString('es-AR')}</div>
                  <div style={{fontSize:11,color:'#64748b',fontWeight:600,marginTop:2}}>DESINSTALACIONES EN XLSX</div>
                </div>
                <div style={{background:'#fef9c3',border:'1px solid #fde047',borderRadius:12,padding:'14px 16px',textAlign:'center'}}>
                  <div style={{fontSize:26,fontWeight:900,color:'#854d0e'}}>{totalNoExitosos.toLocaleString('es-AR')}</div>
                  <div style={{fontSize:11,color:'#854d0e',fontWeight:600,marginTop:2}}>PENDIENTES (NO EXITOSAS)</div>
                </div>
                <div style={{background:'#f0fdf4',border:'1px solid #86efac',borderRadius:12,padding:'14px 16px',textAlign:'center'}}>
                  <div style={{fontSize:26,fontWeight:900,color:'#16a34a'}}>{totalExitososDesins.toLocaleString('es-AR')}</div>
                  <div style={{fontSize:11,color:'#166534',fontWeight:600,marginTop:2}}>EXITOSAS EN XLSX</div>
                </div>
              </div>

              {/* Cruce con Hoja13 */}
              <div style={{background:'#eff6ff',border:'2px solid #93c5fd',borderRadius:14,padding:'18px 20px',marginBottom:20}}>
                <div style={{fontSize:13,fontWeight:800,color:'#1e40af',marginBottom:12}}>🔍 Cruce contra Hoja13 (base actual)</div>
                <div style={{display:'flex',alignItems:'center',gap:16,flexWrap:'wrap'}}>
                  <div style={{textAlign:'center'}}>
                    <div style={{fontSize:32,fontWeight:900,color:'#1d4ed8'}}>{aActualizar > 0 ? aActualizar.toLocaleString('es-AR') : '~'}</div>
                    <div style={{fontSize:11,color:'#1e40af',fontWeight:600}}>SE MARCARÍAN EXITOSAS</div>
                  </div>
                  <div style={{flex:1,fontSize:12,color:'#3730a3'}}>
                    {aActualizar > 0
                      ? `Estas OTs figuran como Exitoso en el xlsx pero en Hoja13 están en otro estado — serán actualizadas.`
                      : `No se pudo cargar Hoja13 para el cruce. El servidor hará el cruce automáticamente al confirmar.`
                    }
                  </div>
                </div>

                {/* Lista de OTs a actualizar */}
                {aActualizar > 0 && (
                  <div style={{marginTop:14}}>
                    <div style={{fontSize:11,fontWeight:700,color:'#94a3b8',letterSpacing:.5,marginBottom:6}}>OTs QUE PASARÍAN A EXITOSO</div>
                    <div style={{border:'1px solid #bfdbfe',borderRadius:10,overflow:'hidden',maxHeight:200,overflowY:'auto'}}>
                      {matchExitosos.slice(0,50).map((ot,i)=>(
                        <div key={i} style={{display:'flex',alignItems:'center',gap:12,padding:'8px 14px',background:i%2===0?'#f0f9ff':'#fff',borderBottom:'1px solid #e0f2fe'}}>
                          <span style={{fontSize:10,color:'#10b981',fontWeight:800}}>✅ EXITOSO</span>
                          <span style={{fontWeight:700,color:'#0A2540',fontSize:13}}>OT #{ot}</span>
                        </div>
                      ))}
                      {matchExitosos.length>50 && (
                        <div style={{padding:'8px 14px',background:'#f8fafc',fontSize:12,color:'#94a3b8',fontStyle:'italic'}}>
                          ...y {(matchExitosos.length-50).toLocaleString('es-AR')} más
                        </div>
                      )}
                    </div>
                  </div>
                )}
              </div>

              {/* CAMBIOS DE ESTADO */}
              {cambiosEstado.length > 0 && (
                <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:14,padding:'18px 20px',marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:800,color:'#0A2540',marginBottom:12}}>🔄 Registros en base con cambio de estado: <span style={{color:'#6366f1'}}>{cambiosEstado.reduce((s,x)=>s+x.cant,0)}</span></div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead>
                      <tr style={{borderBottom:'2px solid #e2e8f0'}}>
                        <th style={{textAlign:'left',padding:'6px 8px',color:'#64748b',fontWeight:700}}>Estado actual (base)</th>
                        <th style={{textAlign:'left',padding:'6px 8px',color:'#64748b',fontWeight:700}}>→ Nuevo estado (planilla)</th>
                        <th style={{textAlign:'right',padding:'6px 8px',color:'#64748b',fontWeight:700}}>Cant</th>
                      </tr>
                    </thead>
                    <tbody>
                      {cambiosEstado.map((c,i)=>{
                        const esExitoso = c.a === 'Exitoso';
                        return(
                          <tr key={i} style={{borderBottom:'1px solid #f1f5f9'}}>
                            <td style={{padding:'7px 8px',color:'#374151'}}>{c.de}</td>
                            <td style={{padding:'7px 8px'}}>
                              <span style={{fontWeight:700,color:esExitoso?'#16a34a':'#374151'}}>→ {c.a} {esExitoso?'✅':''}</span>
                            </td>
                            <td style={{padding:'7px 8px',textAlign:'right',fontWeight:800,color:'#0A2540'}}>{c.cant}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* PROYECCIÓN INDICADORES */}
              {proyeccion && kpisHoy && (
                <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:14,padding:'18px 20px',marginBottom:16}}>
                  <div style={{fontSize:13,fontWeight:800,color:'#0A2540',marginBottom:12}}>📊 Cómo quedarían los indicadores del dashboard</div>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
                    <thead>
                      <tr style={{borderBottom:'2px solid #e2e8f0'}}>
                        <th style={{textAlign:'left',padding:'6px 8px',color:'#64748b',fontWeight:700}}>Indicador</th>
                        <th style={{textAlign:'right',padding:'6px 8px',color:'#64748b',fontWeight:700}}>HOY</th>
                        <th style={{textAlign:'right',padding:'6px 8px',color:'#64748b',fontWeight:700}}>DESPUÉS</th>
                      </tr>
                    </thead>
                    <tbody>
                      {[
                        {label:'TOTAL', hoy:sheetData.length, despues:Object.values(proyeccion).reduce((s,v)=>s+v,0), color:'#0A2540'},
                        {label:'PENDIENTES', hoy:kpisHoy['Pendiente']||0, despues:proyeccion['Pendiente']||0, color:'#f59e0b'},
                        {label:'EN PROCESO', hoy:kpisHoy['En Proceso']||0, despues:proyeccion['En Proceso']||0, color:'#3b82f6'},
                        {label:'DESPACHADAS', hoy:kpisHoy['Despachado']||0, despues:proyeccion['Despachado']||0, color:'#8b5cf6'},
                        {label:'EXITOSAS', hoy:kpisHoy['Exitoso']||0, despues:proyeccion['Exitoso']||0, color:'#10b981'},
                        {label:'EXTRAVIADAS', hoy:kpisHoy['Extraviada']||0, despues:proyeccion['Extraviada']||0, color:'#ef4444'},
                      ].map((row,i)=>{
                        const diff = row.despues - row.hoy;
                        return(
                          <tr key={i} style={{borderBottom:'1px solid #f1f5f9'}}>
                            <td style={{padding:'7px 8px',fontWeight:700,color:row.color}}>{row.label}</td>
                            <td style={{padding:'7px 8px',textAlign:'right',color:'#64748b'}}>{row.hoy.toLocaleString('es-AR')}</td>
                            <td style={{padding:'7px 8px',textAlign:'right'}}>
                              <span style={{fontWeight:900,color:row.color}}>{row.despues.toLocaleString('es-AR')}</span>
                              {diff !== 0 && <span style={{fontSize:11,marginLeft:6,color:diff>0?'#16a34a':'#ef4444',fontWeight:700}}>{diff>0?'+':''}{diff}</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}

              {/* Botones */}
              <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
                <button onClick={handleImport}
                  style={{flex:1,background:'#16a34a',color:'#fff',border:'none',borderRadius:12,padding:'14px',fontSize:15,fontWeight:800,cursor:'pointer'}}>
                  ✅ Confirmar importación
                </button>
                <button onClick={()=>{
                  const fecha = new Date().toLocaleString('es-AR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
                  const totalDespues = proyeccion ? Object.values(proyeccion).reduce((s,v)=>s+v,0) : '?';
                  const kpiCards = [
                    {label:'DESINSTALACIONES EN XLSX', val:totalDesinsXlsx, color:'#0A2540'},
                    {label:'PENDIENTES (NO EXITOSAS)', val:totalNoExitosos, color:'#d97706'},
                    {label:'EXITOSAS EN XLSX', val:totalExitososDesins, color:'#16a34a'},
                    {label:'SE MARCARÍAN EXITOSAS', val:aActualizar||'?', color:'#2563eb'},
                  ].map(k=>`<div style="background:#f8fafc;border:1px solid #e2e8f0;border-radius:10px;padding:14px 18px;text-align:center;flex:1;min-width:130px"><div style="font-size:26px;font-weight:900;color:${k.color}">${typeof k.val==='number'?k.val.toLocaleString('es-AR'):k.val}</div><div style="font-size:10px;color:#64748b;font-weight:700;margin-top:4px">${k.label}</div></div>`).join('');
                  const cambiosRowsHtml = cambiosEstado.map((c,i)=>`<tr style="background:${i%2===0?'#f8fafc':'#fff'}"><td style="padding:8px 12px;color:#374151">${c.de}</td><td style="padding:8px 12px;font-weight:700;color:${c.a==='Exitoso'?'#16a34a':'#374151'}">→ ${c.a} ${c.a==='Exitoso'?'✓':''}</td><td style="padding:8px 12px;text-align:right;font-weight:800">${c.cant}</td></tr>`).join('');
                  const proyRowsHtml = proyeccion && kpisHoy ? [
                    {label:'TOTAL',hoy:sheetData.length,despues:totalDespues,color:'#0A2540'},
                    {label:'PENDIENTES',hoy:kpisHoy['Pendiente']||0,despues:proyeccion['Pendiente']||0,color:'#d97706'},
                    {label:'EN PROCESO',hoy:kpisHoy['En Proceso']||0,despues:proyeccion['En Proceso']||0,color:'#2563eb'},
                    {label:'DESPACHADAS',hoy:kpisHoy['Despachado']||0,despues:proyeccion['Despachado']||0,color:'#7c3aed'},
                    {label:'EXITOSAS',hoy:kpisHoy['Exitoso']||0,despues:proyeccion['Exitoso']||0,color:'#16a34a'},
                    {label:'EXTRAVIADAS',hoy:kpisHoy['Extraviada']||0,despues:proyeccion['Extraviada']||0,color:'#dc2626'},
                  ].map((r,i)=>{const diff=r.despues-r.hoy;const ds=diff===0?'':`<span style="font-size:11px;margin-left:6px;color:${diff>0?'#16a34a':'#dc2626'};font-weight:700">${diff>0?'+':''}${diff}</span>`;return `<tr style="background:${i%2===0?'#f8fafc':'#fff'}"><td style="padding:8px 12px;font-weight:700;color:${r.color}">${r.label}</td><td style="padding:8px 12px;text-align:right;color:#64748b">${r.hoy.toLocaleString('es-AR')}</td><td style="padding:8px 12px;text-align:right"><span style="font-weight:900;color:${r.color}">${r.despues.toLocaleString('es-AR')}</span>${ds}</td></tr>`;}).join('') : '';
                  const otsChips = matchExitosos.map(ot=>`<span style="background:#d1fae5;color:#065f46;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:700;display:inline-block;margin:2px">OT #${ot}</span>`).join('');
                  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Informe Importación Alleata</title>
                  <style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#fff;color:#0A2540;padding:40px;font-size:13px}table{width:100%;border-collapse:collapse}th{background:#0A2540;color:#fff;padding:9px 12px;text-align:left;font-size:11px;letter-spacing:.5px}th:last-child,td:last-child{text-align:right}@media print{body{padding:20px}}</style></head><body>
                  <div style="display:flex;align-items:center;justify-content:space-between;padding-bottom:20px;border-bottom:3px solid #0A2540;margin-bottom:28px">
                    <div style="display:flex;align-items:center;gap:16px">
                      <img src="https://alleata.com.ar/images/Alleata-logo.svg" style="height:44px" onerror="this.style.display='none'"/>
                      <div><div style="font-size:20px;font-weight:900">Informe de Importación</div><div style="font-size:12px;color:#64748b;margin-top:2px">Gestión de Desinstalaciones · Alleata</div></div>
                    </div>
                    <div style="text-align:right">
                      <div style="font-size:11px;color:#64748b">Generado</div><div style="font-weight:700">${fecha}</div>
                      <div style="font-size:11px;color:#64748b;margin-top:4px">Archivo</div><div style="font-weight:600;font-size:12px">${fileName}</div>
                    </div>
                  </div>
                  <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:28px">${kpiCards}</div>
                  ${cambiosEstado.length>0?`<div style="margin-bottom:28px"><div style="font-size:14px;font-weight:800;margin-bottom:10px">🔄 Registros en base con cambio de estado (${cambiosEstado.reduce((s,x)=>s+x.cant,0)})</div><table><thead><tr><th>Estado actual (base)</th><th>→ Nuevo estado (planilla)</th><th>Cantidad</th></tr></thead><tbody>${cambiosRowsHtml}</tbody></table></div>`:''}
                  ${proyeccion&&kpisHoy?`<div style="margin-bottom:28px"><div style="font-size:14px;font-weight:800;margin-bottom:10px">📊 Proyección de indicadores del dashboard</div><table><thead><tr><th>Indicador</th><th>HOY</th><th>DESPUÉS</th></tr></thead><tbody>${proyRowsHtml}</tbody></table></div>`:''}
                  ${matchExitosos.length>0?`<div style="margin-bottom:28px"><div style="font-size:14px;font-weight:800;margin-bottom:10px">✅ OTs que pasarían a Exitoso (${matchExitosos.length})</div><div style="line-height:2">${otsChips}</div></div>`:''}
                  <div style="margin-top:40px;padding-top:16px;border-top:1px solid #e2e8f0;display:flex;justify-content:space-between;font-size:11px;color:#94a3b8"><span>Alleata · Sistema de Gestión de Desinstalaciones</span><span>v5.21</span></div>
                  </body></html>`;
                  const w=window.open('','_blank','width=900,height=700');
                  w.document.write(html);w.document.close();w.focus();
                  setTimeout(()=>w.print(),800);
                }}
                  style={{background:'#0A2540',color:'#fff',border:'none',borderRadius:12,padding:'14px 18px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  📄 Exportar PDF
                </button>
                <button onClick={()=>{setStep('idle');setExitosas([]);setTodasDesins([]);setMatchExitosos([]);setSheetData(null);setFileName('');setError('');}}
                  style={{background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:12,padding:'14px 18px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  Cancelar
                </button>
              </div>
            </div>
          )}

          {/* IMPORTING */}
          {step==='importing' && (
            <div style={{textAlign:'center',padding:'40px 0'}}>
              <div style={{fontSize:48,marginBottom:16}}>⚙️</div>
              <div style={{fontSize:16,fontWeight:700,color:'#0A2540',marginBottom:8}}>Procesando en el servidor...</div>
              <div style={{fontSize:13,color:'#64748b'}}>Cruzando {exitosas.length.toLocaleString('es-AR')} Desinstalaciones Exitosas contra Hoja13</div>
              <div style={{marginTop:24,background:'#e2e8f0',borderRadius:99,height:8,overflow:'hidden'}}>
                <div style={{background:'linear-gradient(90deg,#00BFA5,#0A2540)',height:'100%',width:'100%',borderRadius:99,animation:'pulse 1.5s ease-in-out infinite'}}/>
              </div>
            </div>
          )}

          {/* DONE */}
          {step==='done' && result && (
            <div>
              <div style={{background:'#f0fdf4',border:'2px solid #86efac',borderRadius:16,padding:'28px',textAlign:'center',marginBottom:20}}>
                <div style={{fontSize:48,marginBottom:12}}>✅</div>
                <div style={{fontSize:16,fontWeight:700,color:'#166534',marginTop:4}}>
                  Importación enviada correctamente
                </div>
                <div style={{marginTop:16,display:'flex',gap:12,justifyContent:'center',flexWrap:'wrap'}}>
                  <div style={{background:'#dcfce7',borderRadius:10,padding:'12px 18px'}}>
                    <div style={{fontSize:11,color:'#166534',fontWeight:700}}>DESINSTALACIONES EN XLSX</div>
                    <div style={{fontSize:28,fontWeight:900,color:'#15803d'}}>{(result.totalDesins||0).toLocaleString('es-AR')}</div>
                  </div>
                  <div style={{background:'#dbeafe',borderRadius:10,padding:'12px 18px'}}>
                    <div style={{fontSize:11,color:'#1e40af',fontWeight:700}}>EXITOSAS ENVIADAS</div>
                    <div style={{fontSize:28,fontWeight:900,color:'#1d4ed8'}}>{(result.totalXlsx||0).toLocaleString('es-AR')}</div>
                  </div>
                  {result.actualizadas!=='?' && (
                    <div style={{background:'#fef9c3',borderRadius:10,padding:'12px 18px'}}>
                      <div style={{fontSize:11,color:'#854d0e',fontWeight:700}}>ACTUALIZADAS EN HOJA13</div>
                      <div style={{fontSize:28,fontWeight:900,color:'#92400e'}}>{result.actualizadas}</div>
                    </div>
                  )}
                </div>
                <div style={{marginTop:12,fontSize:13,color:'#64748b'}}>
                  El servidor cruzó contra Hoja13 y actualizó solo las que existen.<br/>
                  Revisá el <strong>Registro de ejecución</strong> en Apps Script para ver el detalle exacto.
                </div>
              </div>
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>{setStep('idle');setExitosas([]);setTodasDesins([]);setMatchExitosos([]);setSheetData(null);setResult(null);setFileName('');setError('');}}
                  style={{flex:1,background:'#0A2540',color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  Nueva importación
                </button>
                <button onClick={()=>setStep('backups')}
                  style={{background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:12,padding:'13px 18px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
                  🗂 Backups
                </button>
              </div>
            </div>
          )}

          {/* BACKUPS */}
          {step==='backups' && (
            <div>
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:16}}>
                <div style={{fontSize:16,fontWeight:800,color:'#0A2540'}}>🗂 Historial de Backups</div>
                <button onClick={()=>setStep('idle')} style={{background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:8,padding:'6px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>← Volver</button>
              </div>
              {backups.length === 0 ? (
                <div style={{background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,padding:'32px',textAlign:'center',color:'#94a3b8',fontSize:14}}>
                  No hay backups guardados aún.<br/>Se generan automáticamente antes de cada importación.
                </div>
              ) : (
                <div style={{border:'1px solid #e2e8f0',borderRadius:12,overflow:'hidden'}}>
                  {backups.map((bkp,i)=>(
                    <div key={bkp.id} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',background:i%2===0?'#f8fafc':'#fff',borderBottom:'1px solid #f1f5f9'}}>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:700,color:'#0A2540',fontSize:14}}>📅 {bkp.fecha}</div>
                        <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>Antes de importar: <em>{bkp.archivo}</em></div>
                      </div>
                      <button
                        onClick={()=>handleRestore(bkp)}
                        disabled={restoring}
                        style={{background:'#fef3c7',color:'#92400e',border:'1px solid #fde68a',borderRadius:8,padding:'6px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                        ↩ Restore
                      </button>
                    </div>
                  ))}
                </div>
              )}
              <div style={{marginTop:12,background:'#fef9c3',border:'1px solid #fde047',borderRadius:10,padding:'12px 14px',fontSize:12,color:'#854d0e'}}>
                ⚠️ El restore envía el CSV del backup al servidor para sobreescribir Hoja13. Revisá Apps Script para confirmar la ejecución.
              </div>
            </div>
          )}

        </div>
      </div>
    </div>
  );
}

function App() {
  const [sheetOts,setSheetOts]=useState(()=>{try{return localStorage.getItem('alleata_ots')||'https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/export?format=csv&gid=1843553678'}catch(e){return 'https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/export?format=csv&gid=1843553678'}});
  const [sheetDistri,setSheetDistri]=useState(()=>{try{return localStorage.getItem('alleata_distri')||'https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/export?format=csv&gid=107031751'}catch(e){return 'https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/export?format=csv&gid=107031751'}});
  function handleConfigSave(o,d){setSheetOts(o);setSheetDistri(d);setSyncStatus('loading');setData([]);setActiveTab('dashboard');}
  const [data,setData]=useState([]);
  const [syncStatus, setSyncStatus] = useState('loading');
  const [selectedSector, setSelectedSector] = useState(null);
  const [estadoF, setEstadoF] = useState('Todos');
  const [zonaF, setZonaF] = useState('Todas');
  const [logF, setLogF] = useState('Todas');
  const [search, setSearch] = useState('');
  const [page, setPage] = useState(0);
  const [sinCpFilter, setSinCpFilter] = useState(null); // 'sinProv' | 'conProv'
  const [listarModal, setListarModal] = useState(null); // {label, color, rows}
  const [otModal, setOtModal] = useState(null);
  const [activeTab, setActiveTab] = useState('dashboard');
  const PAGE = 50;

  useEffect(() => {
    fetch(sheetOts)
      .then(r=>r.text())
      .then(csv=>{
        const lines=csv.split('\n').filter(l=>l.trim());
        if(lines.length<2){setSyncStatus('fallback');return;}
        const heads=lines[0].split(',').map(h=>h.replace(/"/g,'').trim());
        const rows=lines.slice(1).map(line=>{
          const vals=[]; let cur='',inQ=false;
          for(const ch of line){if(ch==='"'){inQ=!inQ;}else if(ch===','&&!inQ){vals.push(cur.trim());cur='';}else{cur+=ch;}}
          vals.push(cur.trim());
          const obj={};
          heads.forEach((h,i)=>{obj[h]=(vals[i]||'').replace(/^"|"$/g,'').trim();});
          return obj;
        });
        if(rows.length>5){
          const mapped=rows.map(r=>{
            // ── Calcular CP final una sola vez ──────────────────────────────
            const cpFinal=(()=>{
              const raw=r.CP_extraido||r.CP||'';
              const stripped=raw.replace(/^[A-Za-z]/,'').replace(/\D/g,'').slice(0,5);
              if(stripped.length>=4) return stripped;
              const colB=(r.b||'').toString().trim();
              const mB=colB.match(/[A-Z](\d{4})/);if(mB) return mB[1];
              const mB2=colB.match(/\b(\d{4,5})\b/);if(mB2) return mB2[1];
              const addr=(r.Direcci_n_de_env_o__Street__s||r.Calle||'');
              const cpInAddr=addr.match(/[A-Z]?(\d{4,5})/);
              if(cpInAddr&&cpInAddr[1].length>=4) return cpInAddr[1];
              const ciudad=(r.Direcci_n_de_env_o__City__s||r.Ciudad||'').toLowerCase().trim();
              if(ciudad&&LOCALIDAD_CP[ciudad]) return LOCALIDAD_CP[ciudad];
              return raw;
            })();
            // ── Provincia: coordenadas del CP como fuente de verdad ──────────
            const pn=(()=>{
              const cpN=parseInt(cpFinal)||0;
              const coords=cpN?CP_COORDS[cpN]:null;
              if(coords){
                const lat=coords[0],lon=coords[1];
                // Tierra del Fuego: lat < -52
                if(lat<-52) return 'Tierra del Fuego';
                // Santa Cruz: lat < -46
                if(lat<-46) return 'Santa Cruz';
                // Chubut: lat < -42
                if(lat<-42) return 'Chubut';
                // Bariloche/El Bolsón area (Río Negro andino): lat < -41, lon < -69
                if(lat<-41) return lon<-69?'Río Negro':'Río Negro';
                // Viedma/Costa RN: lat < -39.5, lon > -65
                // Río Negro costa/centro: lat < -39.5, lon > -64.5
                if(lat<-39.5&&lon>-65.5) return 'Río Negro';
                // Alto Valle del Río Negro — ANTES que regla Neuquén
                // Cipolletti, Gral Roca, Allen, Villa Regina: lon -65.5 a -68, lat -38.5 a -40.5
                if(lon>=-68.0&&lon<=-65.5&&lat<=-38.5&&lat>=-40.5) return 'Río Negro';
                // Neuquén city: lon < -68, lat < -36.5 (excluye Cuyo sur)
                if(lon<-68.0&&lat<-36.5&&lat>-41.5) return 'Neuquén';
                // San Juan: lon < -67.5 (capital a -68.54), lat -27 a -32.5
                if(lon<-67.5&&lat>-32.5&&lat<-27) return 'San Juan';
                // Mendoza: lon < -66, lat -32 a -37.5
                if(lon<-66&&lat>=-37.5&&lat<-32) return 'Mendoza';
                // Mendoza sur (Malargüe, Las Leñas): lon < -68, lat -35 a -37.5
                if(lon<-68&&lat>=-37.5&&lat<-35) return 'Mendoza';
                // Neuquén provincia: lon < -65, lat -36.5 a -41.5
                if(lon<-65&&lat>-41.5&&lat<-36.5) return 'Neuquén';
                // La Rioja, Catamarca, NOA: lon -64 a -68, lat > -32 → usar normProv
              }
              // Fallback: range-based for CPs not in coords dict
              if(cpN>=9300) return 'Santa Cruz';
              if(cpN>=9000) return 'Chubut';
              if(cpN>=8700) return 'Chubut';
              if(cpN>=8500) return 'Río Negro';
              if(cpN>=8300) {
                // 8300-8499: could be Neuquén or Río Negro — use normProv as tiebreaker
                const p=normProv(r.Provincia_limpia||r.Provincia||r.b||'');
                return (p==='Neuquén'||p==='Río Negro')?p:'Neuquén';
              }
              return normProv(r.Provincia_limpia||r.Provincia||r.b||'');
            })();
            const zona=r.Categoria_Zona__c||r.Zona||'Sin Zona';
            return {
              OT:r.WorkOrderNumber||r.OT||'',Comercio:r.Nombre_del_comercio__c||r.Comercio||'',
              Cuenta:r['Account.Name']||r.Cuenta||'',Logistica:r.Logistica__c||r.Logistica||'',
              Estado:r.Status||r.Estado||'',Zona:zona,
              Provincia:r.Provincia_limpia||r.Provincia||r.b||'',CP:cpFinal,
              Ciudad:((r.Direcci_n_de_env_o__City__s||'').trim()||(r.a||r.Ciudad||'').trim()),
              Calle:(r.Direcci_n_de_env_o__Street__s||'').trim()||(r.Direccion_formula__c||r.DireccionFormula||r.Calle||'').trim(),
              Contacto:r.Contacto__c||r.Contacto||'',Horario:r.Horario__c||r.Horario||'',
              GestionEstado:r.Status_Gestion_Retiros__c||r.GestionEstado||'',
              Obs:r.Observaciones__c||r.Obs||'',
              ProvNorm:pn, Sector:getSector(pn,zona,(r.Direcci_n_de_env_o__City__s||'').trim()||(r.a||r.Ciudad||'').trim(),cpFinal),
            };
          });
          setData(mapped); setSyncStatus('live');
        } else setSyncStatus('fallback');
      }).catch(()=>setSyncStatus('fallback'));
  },[sheetOts]);

  const logisticas = useMemo(()=>['Todas',...Array.from(new Set(data.map(r=>r.Logistica).filter(Boolean))).sort()],[data]);

  const filtered = useMemo(()=>data.filter(r=>{
    if(estadoF!=='Todos'&&r.Estado!==estadoF) return false;
    if(zonaF!=='Todas'&&r.Zona!==zonaF) return false;
    if(logF!=='Todas'&&r.Logistica!==logF) return false;
    if(search){const q=search.toLowerCase();return r.OT?.includes(q)||r.Comercio?.toLowerCase().includes(q)||r.Provincia?.toLowerCase().includes(q)||r.Ciudad?.toLowerCase().includes(q)||r.CP?.toLowerCase().includes(q);}
    return true;
  }),[data,estadoF,zonaF,logF,search]);

  // Sectores ordenados de mayor a menor
  const sectorStats = useMemo(()=>{
    const c={};
    filtered.forEach(r=>{
      const s=r.Sector||'Sin dato';
      if(s==='Sin dato') return;
      if(!c[s]) c[s]={total:0,Pendiente:0,'En Proceso':0,Extraviada:0,Despachado:0};
      c[s].total++;
      if(c[s][r.Estado]!==undefined) c[s][r.Estado]++;
    });
    return Object.entries(c).sort((a,b)=>b[1].total-a[1].total);
  },[filtered]);

  const maxCount = sectorStats[0]?.[1]?.total || 1;
  const sectorOTs = useMemo(()=>selectedSector?filtered.filter(r=>r.Sector===selectedSector):[],[filtered,selectedSector]);
  const paged = filtered.slice(page*PAGE,(page+1)*PAGE);
  const totalPages = Math.ceil(filtered.length/PAGE);

  const Btn = ({items,cur,set,colors})=>items.map(v=>(
    <button key={v} onClick={()=>{set(v);setPage(0);}} style={{
      padding:'5px 12px',borderRadius:8,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,whiteSpace:'nowrap',
      background:cur===v?(colors?colors[v]||'#00897B':'#00897B'):'#f0f2f8',
      color:cur===v?'#fff':'#64748b',transition:'all .15s'
    }}>{v}</button>
  ));

  const kpis=[
    {label:'TOTAL',value:filtered.length,color:'#00BFA5'},
    {label:'PENDIENTES',value:filtered.filter(r=>r.Estado==='Pendiente').length,color:'#f59e0b'},
    {label:'EN PROCESO',value:filtered.filter(r=>r.Estado==='En Proceso').length,color:'#3b82f6'},
    {label:'DESPACHADAS',value:filtered.filter(r=>r.Estado==='Despachado').length,color:'#8b5cf6'},
    {label:'EXITOSAS',value:filtered.filter(r=>r.Estado==='Exitoso').length,color:'#10b981'},
    {label:'EXTRAVIADAS',value:filtered.filter(r=>r.Estado==='Extraviada').length,color:'#ef4444'},
  ];

  // Special styling for BsAs rows
  const isBA = s => s?.startsWith('Buenos Aires');

  return (
    <div style={{minHeight:'100vh',background:'#F0F7F6',fontFamily:"'DM Sans',system-ui,sans-serif"}}>
      <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700;900&display=swap" rel="stylesheet"/>

      {/* HEADER */}
      <div style={{background:'linear-gradient(135deg,#0A2540 0%,#063D52 55%,#006B5E 100%)',padding:'18px 28px 22px',boxShadow:'0 4px 24px rgba(0,0,0,.3)'}}>
        <div style={{maxWidth:1380,margin:'0 auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:12,marginBottom:18}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <img src="https://alleata.com.ar/images/Alleata-logo.svg" alt="Alleata" style={{height:30,filter:'brightness(0) invert(1)'}} onError={e=>{e.target.style.display='none';}}/>
                <div style={{fontSize:13,fontWeight:700,color:'#5eead4',borderLeft:'1px solid rgba(255,255,255,.25)',paddingLeft:12,lineHeight:1.4}}>Gestión de Desinstalaciones<br/><span style={{fontSize:10,fontWeight:400,color:'rgba(255,255,255,.6)'}}>Marzo 2026</span><span style={{marginLeft:8,fontSize:10,fontWeight:600,color:'#5eead4',background:'rgba(94,234,212,.15)',borderRadius:6,padding:'1px 7px'}}>v5.21</span></div>
              </div>
              <div style={{fontSize:11,marginTop:4,display:'flex',alignItems:'center',gap:8}}>
                <span style={{display:'inline-block',width:7,height:7,borderRadius:'50%',flexShrink:0,
                  background:syncStatus==='live'?'#10b981':syncStatus==='loading'?'#f59e0b':'#64748b',
                  boxShadow:syncStatus==='live'?'0 0 8px #10b981':'none'}}/>
                <span style={{color:'#99f6e4'}}>
                  {syncStatus==='live'?`✅ Sincronizado desde Google Drive · ${data.length} OTs`:
                   syncStatus==='loading'?'🔄 Conectando con Drive...':
                   `📋 Datos locales · ${data.length} OTs`}
                </span>
              </div>
            </div>
            <a href={SHEET_LINK} target="_blank" rel="noreferrer" style={{background:'rgba(255,255,255,.1)',color:'#99f6e4',border:'1px solid rgba(255,255,255,.2)',borderRadius:10,padding:'8px 16px',fontSize:12,fontWeight:700,textDecoration:'none'}}>🔗 Google Drive</a>
          </div>
          {/* Tab Nav */}
          <div style={{display:'flex',gap:8,marginTop:14}}>
            {[['dashboard','📊 Dashboard'],['distribuidores','🚚 Distribuidores'],['indicadores','📈 Indicadores'],['importar','📥 Importar'],['config','⚙️ Config']].map(([t,label])=>(
              <button key={t} onClick={()=>setActiveTab(t)} style={{
                padding:'8px 18px',borderRadius:10,border:'none',cursor:'pointer',fontSize:12,fontWeight:700,
                background:activeTab===t?'rgba(255,255,255,.2)':'rgba(255,255,255,.07)',
                color:activeTab===t?'#fff':'#99f6e4',
                borderBottom:activeTab===t?'2px solid #818cf8':'2px solid transparent',
              }}>{label}</button>
            ))}
          </div>
          <div style={{display:'flex',gap:12,flexWrap:'wrap'}}>
            {kpis.map(k=>{
              const rows = k.label==='TOTAL' ? filtered : filtered.filter(r=>{
                if(k.label==='PENDIENTES') return r.Estado==='Pendiente';
                if(k.label==='EN PROCESO') return r.Estado==='En Proceso';
                if(k.label==='EXITOSAS')   return r.Estado==='Exitoso';
                if(k.label==='EXTRAVIADAS')return r.Estado==='Extraviada';
                if(k.label==='DESPACHADAS')return r.Estado==='Despachado';
                return false;
              });
              return(
                <div key={k.label} style={{background:'rgba(255,255,255,.07)',backdropFilter:'blur(10px)',borderRadius:14,padding:'14px 20px',borderLeft:`3px solid ${k.color}`,flex:1,minWidth:110,position:'relative'}}>
                  <div style={{fontSize:28,fontWeight:900,color:k.color,lineHeight:1}}>{k.value}</div>
                  <div style={{fontSize:10,color:'rgba(255,255,255,.55)',marginTop:4,fontWeight:700,letterSpacing:.8}}>{k.label}</div>
                  <button onClick={()=>setListarModal({label:k.label,color:k.color,rows})}
                    style={{position:'absolute',bottom:8,right:8,background:'rgba(255,255,255,.12)',color:'rgba(255,255,255,.7)',border:'none',borderRadius:6,padding:'3px 8px',fontSize:10,fontWeight:700,cursor:'pointer'}}>
                    📋 Listar
                  </button>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {activeTab==='distribuidores' && <DistribuidoresTab data={filtered} sheetDistri={sheetDistri}/>}
      {activeTab==='importar' && <ImportarTab webhookUrl={(()=>{try{return localStorage.getItem('alleata_webhook')||''}catch(e){return ''}})()}/>}
      {activeTab==='config' && <ConfigTab sheetOts={sheetOts} sheetDistri={sheetDistri} onSave={handleConfigSave}/>}
      {activeTab==='indicadores' && <IndicadoresTab webhookUrl={(()=>{try{return localStorage.getItem('alleata_webhook')||''}catch(e){return ''}})()}/>}
      {activeTab==='dashboard' && <div style={{display:'none'}}/>}
      <div style={{maxWidth:1380,margin:'0 auto',padding:'22px 20px',display: activeTab==='dashboard' ? 'grid' : 'none',gridTemplateColumns:'360px 1fr',gap:20,alignItems:'start'}}>

        {/* PANEL PROVINCIAS */}
        <div style={{position:'sticky',top:20,zIndex:10}}>
          <div style={{background:'#fff',borderRadius:20,padding:'20px 18px',boxShadow:'0 2px 16px rgba(0,0,0,.07)'}}>
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
              <div>
                <div style={{fontWeight:900,color:'#1e293b',fontSize:15}}>Provincias / Regiones</div>
                <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>Ordenadas por cantidad de OTs · clic para detalle</div>
              </div>
              {selectedSector && (
                <button onClick={()=>setSelectedSector(null)} style={{fontSize:11,fontWeight:700,color:'#00BFA5',background:'#E0F2F1',border:'none',borderRadius:8,padding:'5px 10px',cursor:'pointer'}}>✕ Limpiar</button>
              )}
            </div>

            <div style={{maxHeight:580,overflowY:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse'}}>
                <thead>
                  <tr style={{borderBottom:'2px solid #e2e8f0'}}>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8',width:24}}>#</th>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8'}}>PROVINCIA / REGIÓN</th>
                    <th style={{padding:'5px 6px',textAlign:'right',fontSize:10,fontWeight:700,color:'#94a3b8',width:40}}>OTs</th>
                    <th style={{padding:'5px 6px',textAlign:'left',fontSize:10,fontWeight:700,color:'#94a3b8',width:80}}>ESTADOS</th>
                  </tr>
                </thead>
                <tbody>
                  {sectorStats.map(([sector, stats], idx) => {
                    const isSel = selectedSector === sector;
                    const baStyle = isBA(sector);
                    const pct = Math.round((stats.total / maxCount) * 100);
                    const rowBg = isSel ? '#E0F2F1' : 'transparent';
                    return (
                      <tr key={sector}
                        onClick={()=>setSelectedSector(isSel?null:sector)}
                        style={{cursor:'pointer',background:rowBg,borderBottom:'1px solid #f1f5f9'}}
                        onMouseEnter={e=>{ if(!isSel) e.currentTarget.style.background='#f8fafc'; }}
                        onMouseLeave={e=>{ if(!isSel) e.currentTarget.style.background='transparent'; }}>
                        <td style={{padding:'8px 6px',fontSize:11,fontWeight:700,color:isSel?'#00897B':'#94a3b8',verticalAlign:'top'}}>
                          {idx+1}
                        </td>
                        <td style={{padding:'8px 6px',verticalAlign:'top'}}>
                          <div style={{fontSize:13,fontWeight:700,color:isSel?'#004D40':baStyle?'#5b21b6':'#1e293b',marginBottom:5,lineHeight:1.3}}>
                            {baStyle
                              ? <span><span style={{fontSize:10,fontWeight:400,color:'#94a3b8'}}>Bs As · </span>{sector.split('— ')[1]}</span>
                              : sector}
                          </div>
                          <div style={{height:4,borderRadius:2,background:'#e2e8f0'}}>
                            <div style={{height:'100%',width:pct+'%',minWidth:4,borderRadius:2,background:isSel?'#00897B':baStyle?'#8b5cf6':'#5eead4'}}/>
                          </div>
                        </td>
                        <td style={{padding:'8px 6px',textAlign:'right',fontSize:18,fontWeight:900,color:isSel?'#00897B':baStyle?'#6d28d9':'#334155',verticalAlign:'top',whiteSpace:'nowrap'}}>
                          {stats.total}
                        </td>
                        <td style={{padding:'8px 6px',verticalAlign:'top'}}>
                          {[['P',stats.Pendiente,'#f59e0b'],['EP',stats['En Proceso'],'#3b82f6'],['EX',stats.Extraviada,'#ef4444'],['D',stats.Despachado,'#10b981']]
                            .filter(([,v])=>v>0).map(([lbl,val,col])=>(
                            <div key={lbl} style={{fontSize:10,fontWeight:700,color:col,whiteSpace:'nowrap',lineHeight:1.7}}>
                              <span style={{background:col+'22',borderRadius:3,padding:'0 4px',marginRight:3}}>{lbl}</span>{val}
                            </div>
                          ))}
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>

        {/* COLUMNA DERECHA */}
        <div style={{minWidth:0}}>

        {/* PANEL SIN CP */}
        {(() => {
          const sinCp = filtered.filter(r => !r.CP);
          if (sinCp.length === 0) return null;
          const sinProv = sinCp.filter(r => !r.Provincia || r.Provincia === 'Sin dato');
          const conTexto = sinCp.filter(r => r.Provincia && r.Provincia !== 'Sin dato');
          return (
            <div style={{background:'#fffbeb',borderRadius:20,padding:'16px 18px',boxShadow:'0 2px 16px rgba(0,0,0,.07)',marginBottom:16,border:'1px solid #fcd34d'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
                <div style={{display:'flex',alignItems:'center',gap:8}}>
                  <span style={{fontSize:16}}>⚠️</span>
                  <div>
                    <div style={{fontWeight:900,color:'#92400e',fontSize:13}}>Sin Código Postal</div>
                    <div style={{fontSize:11,color:'#b45309',marginTop:1}}>{sinCp.length} OTs sin CP · no se puede calcular distancia</div>
                  </div>
                </div>
                <button onClick={()=>setSinCpFilter(sinCpFilter?null:'sinProv')} style={{
                  background:'#f59e0b',color:'#fff',border:'none',borderRadius:9,
                  padding:'7px 14px',fontSize:11,fontWeight:800,cursor:'pointer',
                  display:'flex',alignItems:'center',gap:5
                }}>👁 {sinCpFilter?'Ocultar':'Ver listado'}</button>
              </div>
              <div style={{display:'flex',gap:8}}>
                <div onClick={()=>setSinCpFilter(sinCpFilter==='sinProv'?null:'sinProv')} style={{flex:1,background:sinCpFilter==='sinProv'?'#fcd34d':'#fef3c7',borderRadius:10,padding:'10px 14px',border:sinCpFilter==='sinProv'?'2px solid #f59e0b':'1px solid #fcd34d',cursor:'pointer'}}>
                  <div style={{fontSize:22,fontWeight:900,color:'#d97706'}}>{sinProv.length}</div>
                  <div style={{fontSize:10,color:'#92400e',fontWeight:700,marginTop:2}}>SIN PROVINCIA NI CP</div>
                  <div style={{fontSize:10,color:'#b45309',marginTop:2}}>{sinCpFilter==='sinProv'?'▲ Ocultar':'Clic para ver →'}</div>
                </div>
                <div onClick={()=>setSinCpFilter(sinCpFilter==='conProv'?null:'conProv')} style={{flex:1,background:sinCpFilter==='conProv'?'#fed7aa':'#fff7ed',borderRadius:10,padding:'10px 14px',border:sinCpFilter==='conProv'?'2px solid #ea580c':'1px solid #fed7aa',cursor:'pointer'}}>
                  <div style={{fontSize:22,fontWeight:900,color:'#ea580c'}}>{conTexto.length}</div>
                  <div style={{fontSize:10,color:'#92400e',fontWeight:700,marginTop:2}}>CON PROVINCIA SIN CP</div>
                  <div style={{fontSize:10,color:'#b45309',marginTop:2}}>{sinCpFilter==='conProv'?'▲ Ocultar':'Clic para ver →'}</div>
                </div>
              </div>
            </div>
          );
        })()}


        {/* INLINE SIN CP TABLE */}
        {sinCpFilter && (() => {
          const sinCp = filtered.filter(r => !r.CP);
          const rows = sinCpFilter==='sinProv'
            ? sinCp.filter(r=>!r.Provincia||r.Provincia==='Sin dato')
            : sinCp.filter(r=>r.Provincia&&r.Provincia!=='Sin dato');
          const title = sinCpFilter==='sinProv' ? '⚠️ Sin Provincia ni CP' : '📍 Con Provincia pero sin CP';
          return (
            <div style={{position:'fixed',inset:0,background:'rgba(10,37,64,.7)',backdropFilter:'blur(4px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:200,padding:16}} onClick={()=>setSinCpFilter(null)}>
              <div style={{background:'#fffbeb',borderRadius:18,border:'2px solid #fcd34d',overflow:'hidden',width:'100%',maxWidth:900,maxHeight:'85vh',display:'flex',flexDirection:'column'}} onClick={e=>e.stopPropagation()}>
                <div style={{padding:'12px 18px',borderBottom:'1px solid #fcd34d',display:'flex',justifyContent:'space-between',alignItems:'center',flexShrink:0}}>
                  <div>
                    <span style={{fontWeight:800,color:'#92400e',fontSize:13}}>{title}</span>
                    <span style={{marginLeft:10,fontSize:11,color:'#b45309'}}>{rows.length} registros</span>
                  </div>
                  <button onClick={()=>setSinCpFilter(null)} style={{background:'#f59e0b',color:'#fff',border:'none',borderRadius:8,padding:'5px 12px',fontSize:11,fontWeight:700,cursor:'pointer'}}>✕ Cerrar</button>
                </div>
                <div style={{overflowX:'auto',overflowY:'auto',flex:1}}>
                  <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                    <thead style={{position:'sticky',top:0,background:'#fffbeb',zIndex:1}}>
                      <tr>{['OT','Comercio','Logística','Estado','Zona','Ciudad','Provincia','Dirección','Contacto'].map(h=>(
                        <th key={h} style={{padding:'8px 12px',textAlign:'left',fontWeight:700,color:'#92400e',borderBottom:'2px solid #fcd34d',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                      ))}</tr>
                    </thead>
                    <tbody>
                      {rows.map((r,i)=>{
                        const ec=ESTADO_C[r.Estado];
                        return(
                          <tr key={i} onClick={()=>setOtModal(r)} style={{borderBottom:'1px solid #fef3c7',background:i%2===0?'#fffbeb':'#fff',cursor:'pointer'}}
                            onMouseEnter={e=>e.currentTarget.style.background='#fef3c7'}
                            onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fffbeb':'#fff'}>
                            <td style={{padding:'7px 12px',fontWeight:800,color:'#d97706',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                            <td style={{padding:'7px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Comercio}</td>
                            <td style={{padding:'7px 12px',color:'#64748b',fontSize:11}}>{r.Logistica}</td>
                            <td style={{padding:'7px 12px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 7px',fontSize:10,fontWeight:700}}>{r.Estado}</span>:r.Estado}</td>
                            <td style={{padding:'7px 12px',color:'#64748b',fontSize:11}}>{r.Zona}</td>
                            <td style={{padding:'7px 12px',color:'#475569'}}>{r.Ciudad}</td>
                            <td style={{padding:'7px 12px',color:'#92400e',fontWeight:600,fontSize:11}}>{r.Provincia||'—'}</td>
                            <td style={{padding:'7px 12px',color:'#64748b',maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Calle}</td>
                            <td style={{padding:'7px 12px',color:'#475569',whiteSpace:'nowrap',fontSize:11}}>{r.Contacto}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            </div>
          );
        })()}

        {/* PANEL TABLA */}
        <div>
          <div style={{background:'#fff',borderRadius:18,padding:'16px 20px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',marginBottom:16}}>
            <div style={{display:'flex',gap:16,flexWrap:'wrap',alignItems:'flex-start'}}>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>ZONA</div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><Btn items={['Todas','CABA','GBA','PBA','INTERIOR','Sin Zona']} cur={zonaF} set={setZonaF}/></div>
              </div>
              <div>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>ESTADO</div>
                <div style={{display:'flex',gap:5,flexWrap:'wrap'}}><Btn items={['Todos','Pendiente','En Proceso','Extraviada','Despachado']} cur={estadoF} set={setEstadoF} colors={ESTADO_C}/></div>
              </div>
              <div style={{marginLeft:'auto'}}>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',marginBottom:7,letterSpacing:.6}}>BUSCAR</div>
                <input value={search} onChange={e=>{setSearch(e.target.value);setPage(0);}} placeholder="OT, comercio, provincia, CP..."
                  style={{padding:'7px 13px',borderRadius:9,border:'1px solid #e2e8f0',fontSize:12,width:230,fontFamily:'inherit',outline:'none'}}/>
              </div>
            </div>
          </div>

          <div style={{background:'#fff',borderRadius:18,boxShadow:'0 2px 12px rgba(0,0,0,.06)',overflow:'hidden'}}>
            <div style={{padding:'14px 20px',borderBottom:'1px solid #f1f5f9',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <span style={{fontWeight:800,color:'#1e293b',fontSize:14}}>
                {selectedSector ? <><span style={{color:'#00BFA5'}}>📍 {selectedSector}</span> · </> : ''}{filtered.length} Órdenes de Trabajo
              </span>
              <span style={{fontSize:11,color:'#94a3b8'}}>Pág {page+1}/{totalPages||1} · Clic en fila para detalle</span>
            </div>
            <div style={{overflowX:'auto'}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead>
                  <tr style={{background:'#f8fafc'}}>
                    {['Orden de Trabajo','Comercio','Logística','Estado','Zona','Provincia','CP','Ciudad'].map(h=>(
                      <th key={h} style={{padding:'9px 14px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {paged.map((r,i)=>{
                    const zc=ZONA_C[r.Zona]; const ec=ESTADO_C[r.Estado];
                    return (
                      <tr key={i} onClick={()=>setOtModal(r)} style={{borderBottom:'1px solid #f8fafc',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f8fafc'}
                        onMouseLeave={e=>e.currentTarget.style.background=''}>
                        <td style={{padding:'9px 14px',fontWeight:800,color:'#00897B',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                        <td style={{padding:'9px 14px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}} title={r.Comercio}>{r.Comercio}</td>
                        <td style={{padding:'9px 14px',color:'#64748b'}}>{r.Logistica}</td>
                        <td style={{padding:'9px 14px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700,whiteSpace:'nowrap'}}>{r.Estado}</span>:r.Estado}</td>
                        <td style={{padding:'9px 14px'}}>{zc?<span style={{background:zc.bg,color:zc.text,border:`1px solid ${zc.bd}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Zona}</span>:r.Zona}</td>
                        <td style={{padding:'9px 14px',color:'#475569'}}>{r.ProvNorm}</td>
                        <td style={{padding:'9px 14px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                        <td style={{padding:'9px 14px',color:'#64748b'}}>{r.Ciudad}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            {totalPages>1&&(
              <div style={{display:'flex',gap:6,padding:'12px 20px',borderTop:'1px solid #f1f5f9',justifyContent:'center',alignItems:'center'}}>
                {[['«',0],['‹',Math.max(0,page-1)],null,['›',Math.min(totalPages-1,page+1)],['»',totalPages-1]].map((item,i)=>
                  item===null
                    ?<span key={i} style={{fontSize:12,color:'#94a3b8',padding:'0 8px'}}>{page+1} / {totalPages}</span>
                    :<button key={i} onClick={()=>setPage(item[1])} style={{padding:'6px 11px',borderRadius:7,border:'1px solid #e2e8f0',cursor:'pointer',background:'#fff',color:'#64748b'}}>{item[0]}</button>
                )}
              </div>
            )}
          </div>
        </div>
        </div>
      </div>


      

      {activeTab==='dashboard' && selectedSector && sectorOTs.length>0 && (
        <ProvModal sector={selectedSector} ots={sectorOTs} onClose={()=>setSelectedSector(null)} onOtClick={setOtModal} allData={data} cpCoords={CP_COORDS}/>
      )}
      <OtModal ot={otModal} onClose={()=>setOtModal(null)} webhookUrl={(()=>{try{return localStorage.getItem('alleata_webhook')||''}catch(e){return ''}})()} />

      {/* LISTAR MODAL */}
      {listarModal && (
        <div style={{position:'fixed',inset:0,background:'rgba(10,37,64,.75)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:500,padding:16}} onClick={()=>setListarModal(null)}>
          <div style={{background:'#fff',borderRadius:20,width:'100%',maxWidth:1000,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 28px 80px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            {/* Header */}
            <div style={{background:'linear-gradient(135deg,#0A2540,#063D52)',padding:'18px 24px',color:'#fff',flexShrink:0,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontSize:18,fontWeight:900,color:listarModal.color}}>{listarModal.label}</div>
                <div style={{fontSize:12,color:'#99f6e4',marginTop:2}}>{listarModal.rows.length} órdenes de trabajo · {new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}</div>
              </div>
              <div style={{display:'flex',gap:8}}>
                <button onClick={()=>{
                  const w=window.open('','_blank');
                  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Alleata · ${listarModal.label}</title>
                  <style>
                    *{box-sizing:border-box;margin:0;padding:0}
                    body{font-family:system-ui,sans-serif;padding:20px;color:#0A2540}
                    h1{font-size:20px;font-weight:900;color:#0A2540;margin-bottom:4px}
                    .sub{font-size:12px;color:#64748b;margin-bottom:16px}
                    table{width:100%;border-collapse:collapse;font-size:11px}
                    th{background:#0A2540;color:#fff;padding:7px 10px;text-align:left;font-weight:700}
                    td{padding:6px 10px;border-bottom:1px solid #e2e8f0}
                    tr:nth-child(even) td{background:#f8fafc}
                    .badge{display:inline-block;border-radius:99px;padding:2px 8px;font-size:10px;font-weight:700}
                    @media print{body{padding:10px}button{display:none}}
                  </style></head><body>
                  <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">
                    <div><h1>Alleata · ${listarModal.label}</h1><div class="sub">${listarModal.rows.length} órdenes · ${new Date().toLocaleDateString('es-AR',{day:'2-digit',month:'long',year:'numeric'})}</div></div>
                    <button onclick="window.print()" style="background:#0A2540;color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12px;font-weight:700;cursor:pointer">🖨️ Imprimir</button>
                  </div>
                  <table>
                    <thead><tr><th>#</th><th>OT</th><th>Comercio</th><th>Logística</th><th>Estado</th><th>Provincia</th><th>Ciudad</th><th>Dirección</th><th>CP</th><th>Contacto</th><th>Horario</th></tr></thead>
                    <tbody>${listarModal.rows.map((r,i)=>`
                      <tr>
                        <td style="color:#94a3b8;font-size:10px">${i+1}</td>
                        <td style="font-weight:800;color:#00897B">OT #${r.OT}</td>
                        <td>${r.Comercio||''}</td>
                        <td style="color:#64748b;font-size:10px">${r.Logistica||''}</td>
                        <td><span class="badge" style="background:${(ESTADO_C[r.Estado]||'#94a3b8')}22;color:${ESTADO_C[r.Estado]||'#64748b'};border:1px solid ${ESTADO_C[r.Estado]||'#e2e8f0'}">${r.Estado||''}</span></td>
                        <td>${r.ProvNorm||''}</td>
                        <td>${r.Ciudad||''}</td>
                        <td>${r.Calle||''}</td>
                        <td style="font-family:monospace;font-size:10px">${r.CP||''}</td>
                        <td>${r.Contacto||''}</td>
                        <td style="font-size:10px;color:#64748b">${r.Horario||''}</td>
                      </tr>`).join('')}
                    </tbody>
                  </table>
                  </body></html>`);
                  w.document.close();
                }} style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'none',borderRadius:10,padding:'8px 16px',fontSize:12,fontWeight:700,cursor:'pointer'}}>
                  🖨️ Vista impresión
                </button>
                <button onClick={()=>setListarModal(null)} style={{background:'rgba(255,255,255,.15)',color:'#fff',border:'none',borderRadius:10,padding:'8px 14px',fontSize:13,fontWeight:700,cursor:'pointer'}}>✕</button>
              </div>
            </div>
            {/* Table */}
            <div style={{overflowY:'auto',flex:1}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead style={{position:'sticky',top:0,background:'#f8fafc',zIndex:1}}>
                  <tr>{['#','OT','Comercio','Logística','Estado','Provincia','Ciudad','Dirección','CP','Contacto'].map(h=>(
                    <th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>
                  ))}</tr>
                </thead>
                <tbody>
                  {listarModal.rows.map((r,i)=>{
                    const ec=ESTADO_C[r.Estado];
                    return(
                      <tr key={i} onClick={()=>{setOtModal(r);setListarModal(null);}}
                        style={{borderBottom:'1px solid #f1f5f9',cursor:'pointer',background:i%2===0?'#fff':'#f8fafc'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f0fdf4'}
                        onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#f8fafc'}>
                        <td style={{padding:'8px 12px',color:'#94a3b8',fontSize:11}}>{i+1}</td>
                        <td style={{padding:'8px 12px',fontWeight:800,color:'#00897B',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                        <td style={{padding:'8px 12px',maxWidth:180,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Comercio}</td>
                        <td style={{padding:'8px 12px',color:'#64748b',fontSize:11}}>{r.Logistica}</td>
                        <td style={{padding:'8px 12px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Estado}</span>:r.Estado}</td>
                        <td style={{padding:'8px 12px',color:'#475569'}}>{r.ProvNorm}</td>
                        <td style={{padding:'8px 12px',color:'#64748b'}}>{r.Ciudad}</td>
                        <td style={{padding:'8px 12px',color:'#64748b',maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Calle}</td>
                        <td style={{padding:'8px 12px',fontFamily:'monospace',fontSize:11,color:'#94a3b8'}}>{r.CP}</td>
                        <td style={{padding:'8px 12px',color:'#475569',whiteSpace:'nowrap',fontSize:11}}>{r.Contacto}</td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
