function normAcc(s){return(s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'');}
function getAmbaSubzona(ciudad){
  // Strip zone suffixes, normalize accents, lowercase
  const raw=(ciudad||'').toLowerCase().trim().replace(/–/g,'-').replace(/\s*\(zona[\s\w]+\)/g,'').replace(/\s*\((?:caba|sur|norte|oeste|este|centro)\)/g,'').trim();
  if(!raw) return null;
  const c=normAcc(raw); // sin acentos
  // Detect "ciudad autonoma..." variants as CABA
  if(c.startsWith('ciudad auto')||c.startsWith('capital fed')||c==='caba'||c==='buenos aires') return 'CABA';
  // Compound names like "Recoleta / Palermo" -> take part before "/" and check
  const cBase=c.replace(/\s*\/\s*.*/,'').trim();
  if(cBase!==c&&(CABA_LOCS.has(cBase)||CABA_LOCS.has(normAcc(cBase)))) return 'CABA';
  if(cBase!==c&&(AMBA_SUR.has(cBase)||AMBA_SUR.has(normAcc(cBase)))) return 'Zona Sur';
  if(cBase!==c&&(AMBA_NORTE.has(cBase)||AMBA_NORTE.has(normAcc(cBase)))) return 'Zona Norte';
  if(cBase!==c&&(AMBA_OESTE.has(cBase)||AMBA_OESTE.has(normAcc(cBase)))) return 'Zona Oeste';
  if(CABA_LOCS.has(c)||CABA_LOCS.has(raw)) return 'CABA';
  if(AMBA_NORTE.has(c)||AMBA_NORTE.has(raw)) return 'Zona Norte';
  if(AMBA_SUR.has(c)||AMBA_SUR.has(raw))   return 'Zona Sur';
  if(AMBA_OESTE.has(c)||AMBA_OESTE.has(raw)) return 'Zona Oeste';
  return null;
}
function parseCSV(csv){
  function tokenize(text){
    const rows=[];let row=[],cur='',inQ=false,i=0;
    while(i<text.length){
      const ch=text[i];
      if(inQ){
        if(ch==='"'){
          if(text[i+1]==='"'){cur+='"';i+=2;continue;}
          else{inQ=false;i++;continue;}
        }
        cur+=ch;i++;
      } else {
        if(ch==='"'){inQ=true;i++;continue;}
        if(ch===','){row.push(cur);cur='';i++;continue;}
        if(ch==='\r'&&text[i+1]==='\n'){row.push(cur);rows.push(row);row=[];cur='';i+=2;continue;}
        if(ch==='\n'||ch==='\r'){row.push(cur);rows.push(row);row=[];cur='';i++;continue;}
        cur+=ch;i++;
      }
    }
    row.push(cur);
    if(row.some(c=>c!==''))rows.push(row);
    return rows;
  }
  const rows=tokenize(csv);
  if(rows.length<2)return[];
  const heads=rows[0].map(h=>h.trim());
  return rows.slice(1).map(row=>{
    const o={};
    heads.forEach((h,i)=>{
      // Limpiar saltos de línea dentro de campos
      o[h]=(row[i]||'').replace(/[\r\n]+/g,' ').trim();
    });
    return o;
  });
}
function normProv(p) {
  if (!p) return 'Sin dato';
  const low = (p||'').toLowerCase().trim();
  for (const [k,v] of Object.entries(PROV_CANON)) {
    if (low.startsWith(k)) return v;
  }
  return 'Sin dato';
}

function getSector(prov, zona, ciudad, cp) {
  if (prov === 'Buenos Aires' || prov === 'CABA') {
    const cpN = parseInt(cp)||0;
    const cpEnMapa = cpN && CP_COORDS[cpN];
    // Si el CP está en el mapa, el haversine es AUTORITATIVO — ignora campo Zona del sheet
    if (cpEnMapa) {
      return isEnRadioAmba(cp) ? 'Buenos Aires — AMBA' : 'Buenos Aires — Interior';
    }
    // Sin CP en mapa: usar campo Zona del sheet como fallback
    if (zona === 'GBA' || zona === 'CABA') return 'Buenos Aires — AMBA';
    // Sin Zona: usar ciudad conocida
    if (ciudad) {
      const sub = getAmbaSubzona(ciudad);
      if (sub) return 'Buenos Aires — AMBA';
      const cl = ciudad.toLowerCase();
      if (cl.includes('zona sur')||cl.includes('zona norte')||cl.includes('zona oeste')||cl.includes('(caba)')) return 'Buenos Aires — AMBA';
    }
    return 'Buenos Aires — Interior';
  }
  return prov;
}

function haversine(lat1,lon1,lat2,lon2){
  const R=6371,toRad=x=>x*Math.PI/180;
  const dLat=toRad(lat2-lat1),dLon=toRad(lon2-lon1);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLon/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}

    const DISTRI_KEY = 'alleata_distri';
    const sheetD = (()=>{ try{return localStorage.getItem(DISTRI_KEY)||''}catch(e){return ''} })();
    const SHEET_DISTRI_URL = sheetD || 'https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/export?format=csv&gid=107031751';
    fetch(SHEET_DISTRI_URL).then(r=>r.text()).then(csv=>{
      const rows = parseCSV(csv);
      const mapped = rows.filter(r=>(r.Nombre||r.nombre||'').trim()).map((r,i)=>{
        const nombre=(r.Nombre||r.nombre||'').trim();
        const apellido=(r.Apellido||r.apellido||'').trim();
        const prov=(r.Provincia||r.provincia||'').trim();
        const cp=(r['Codigo Postal']||r['Código Postal']||r.CP||'').toString().replace(/\D/g,'').slice(0,5);
        const radio=parseInt(r.Radio||r.radio||'50')||50;
        const cpNum=parseInt(cp)||0;
        const coords=cpNum?cpCoords[cpNum]:null;
        return {id:i,nombre,apellido,prov,radio,lat:coords?coords[0]:null,lon:coords?coords[1]:null};
      }).filter(d=>{
        // only distris whose province matches this sector
        const dp = normProv(d.prov);
        return dp === provName || d.prov.toLowerCase().includes(provName.toLowerCase());
      });
      // For each distri, compute which OTs are in their radius
      const enriched = mapped.map(d=>{
        if(!d.lat) return {...d, assignedOts:[]};
        const assigned = ots.filter(r=>{
          if(['Despachado','Extraviada'].includes(r.Estado)) return false;
          const m=(r.CP||'').match(/\d{4,5}/);
          if(!m) return false;
          const c=cpCoords[parseInt(m[0])];
          if(!c) return false;
          return haversine(d.lat,d.lon,c[0],c[1])<=d.radio;
        }).map(r=>{
          const m=(r.CP||'').match(/\d{4,5}/);
          const c=cpCoords[parseInt(m[0])];
          return {...r, distADistri: Math.round(haversine(d.lat,d.lon,c[0],c[1])*10)/10};
        }).sort((a,b)=>a.distADistri-b.distADistri);
        return {...d, assignedOts: assigned};
      });
      setDistrisModal(enriched);
    }).catch(()=>{});
  },[sector]);

  // OTs NOT covered by any distri (in this province, pending/en proceso)
  const otsConDistri = new Set(distrisModal.flatMap(d=>d.assignedOts.map(r=>r.OT)));
  const otsSinDistri = ots.filter(r=>!['Despachado','Extraviada'].includes(r.Estado)&&!otsConDistri.has(r.OT));

  const ambaOrder = ['Sin ciudad','CABA','Zona Norte','Zona Sur','Zona Oeste'];

  const ciudades = useMemo(()=>{
    const m={};
    ots.forEach(r=>{
      // Skip OTs already assigned to a distribuidor
      if(otsConDistri.has(r.OT)) return;
      // Clean city name: strip "(Zona Sur)" type suffixes from sheet data
      // Use same city priority: envío field first, then account field
      const rawCiudad=((r.Ciudad||'').replace(/–/g,'-').replace(/\s*\(zona\s+[\w\s]+?\)/gi,'').replace(/\s*\((?:caba|sur|norte|oeste|este|centro|fuera\s+de\s+gba)\)/gi,'').trim());
      // Normalize key: lowercase + remove accents → groups "Río Grande", "rio grande", "RIO GRANDE" together
      const normKey = (s) => s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().trim();
      // Display name: Title Case from the first occurrence seen
      let c = rawCiudad||'Sin ciudad';
      const cKey = normKey(c);  // use normalized key for grouping
      if(isAmba){
        const sub = getAmbaSubzona(c);
        if(sub) c = sub;
        else if(r.Zona==='CABA'||c.toLowerCase().includes('caba')||c.toLowerCase().includes('ciudad autonoma')) c='CABA';
        // Unknown AMBA city: keep the cleaned name instead of dumping to 'Sin ciudad'
      }
      // Use normalized key for grouping; store display name from first occurrence
      const groupKey = isAmba ? c : normKey(c);
      if(!m[groupKey]){m[groupKey]={total:0,Pendiente:0,'En Proceso':0,Extraviada:0,Despachado:0,ots:[],displayName:c};}
      m[groupKey].total++;
      if(m[groupKey][r.Estado]!==undefined)m[groupKey][r.Estado]++;
      m[groupKey].ots.push(r);
    });
    if(isAmba){
      return Object.entries(m).map(([k,v])=>[v.displayName||k,v]).sort((a,b)=>{
        const ia=ambaOrder.indexOf(a[0]),ib=ambaOrder.indexOf(b[0]);
        if(ia!==-1&&ib!==-1)return ia-ib;
        if(ia!==-1)return -1;
        if(ib!==-1)return 1;
        return b[1].total-a[1].total;
      });
    }
    return Object.entries(m).map(([k,v])=>[v.displayName||k,v]).sort((a,b)=>b[1].total-a[1].total);
  },[ots,isAmba,otsConDistri]);

  const otsCity = ciudadSel
    ? ciudadSel.startsWith('__distri__')
      ? (distrisModal.find(d=>'__distri__'+d.id===ciudadSel)?.assignedOts||[])
      : ciudadSel==='__sin_distri__'
      ? otsSinDistri
      : (ciudades.find(([c])=>c===ciudadSel)?.[1]?.ots||[])
    : [];
  const otsFiltradas = otsCity.filter(r=>{
    if(ef!=='Todos'&&r.Estado!==ef)return false;
    if(q){const s=q.toLowerCase();return r.OT?.includes(s)||r.Comercio?.toLowerCase().includes(s);}
    return true;
  });
  const eCounts={};otsCity.forEach(r=>{eCounts[r.Estado]=(eCounts[r.Estado]||0)+1;});

  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,37,64,.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:960,maxHeight:'92vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 28px 90px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'linear-gradient(135deg,#0A2540,#063D52)',padding:'18px 24px',color:'#fff',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{display:'flex',alignItems:'center',gap:10}}>
              {ciudadSel&&<button onClick={()=>{setCiudadSel(null);setQ('');setEf('Todos');}} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:8,padding:'5px 12px',cursor:'pointer',fontSize:12,fontWeight:700}}>← Volver</button>}
              <div>
                <div style={{fontSize:18,fontWeight:900}}>📍 {sector}
                {ciudadSel&&<span style={{color:'#5eead4'}}> › {
                  ciudadSel.startsWith('__distri__')
                    ? (()=>{const d=distrisModal.find(d=>'__distri__'+d.id===ciudadSel);return d?d.nombre+' '+d.apellido:'Distribuidor';})()
                    : ciudadSel==='__sin_distri__' ? 'Sin distribuidor' : ciudadSel
                }</span>}
              </div>
                <div style={{fontSize:11,color:'#99f6e4',marginTop:2}}>{ciudadSel?`${otsCity.length} OTs · ${otsFiltradas.length} mostradas`:`${ots.length} OTs · ${ciudades.length} ciudades`}</div>
              </div>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'7px 14px',cursor:'pointer',fontWeight:700,fontSize:13}}>✕</button>
          </div>
          {ciudadSel&&(
            <div style={{display:'flex',gap:6,marginTop:10,flexWrap:'wrap'}}>
              {Object.entries(eCounts).map(([e,c])=>(<span key={e} style={{background:'rgba(255,255,255,.12)',color:'#fff',borderRadius:99,padding:'2px 10px',fontSize:11,fontWeight:700}}><span style={{display:'inline-block',width:6,height:6,borderRadius:'50%',background:ESTADO_C[e]||'#fff',marginRight:5,verticalAlign:'middle'}}/>{e}: {c}</span>))}
            </div>
          )}
        </div>

        {!ciudadSel&&(
          <div style={{overflowY:'auto',flex:1,padding:'16px'}}>
            {distrisModal.length>0&&(
              <div style={{marginBottom:16}}>
                <div style={{fontSize:11,fontWeight:700,color:'#00695C',letterSpacing:.5,marginBottom:8}}>🚚 DISTRIBUIDORES EN ESTA PROVINCIA</div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:8,marginBottom:12}}>
                  {distrisModal.map(d=>(
                    <div key={d.id} style={{background:'#E0F2F1',borderRadius:12,padding:'12px 14px',border:'2px solid #80CBC4'}}>
                      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:6}}>
                        <div style={{fontWeight:800,color:'#004D40',fontSize:13}}>{d.nombre} {d.apellido}</div>
                        <span style={{background:'#00897B',color:'#fff',borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:700}}>{d.assignedOts.length} OTs</span>
                      </div>
                      <div style={{fontSize:11,color:'#00695C'}}>Radio: {d.radio} km{!d.lat?' · ⚠️ Sin coordenadas':''}</div>
                      {d.assignedOts.length>0&&(
                        <button onClick={()=>setCiudadSel('__distri__'+d.id)} style={{marginTop:8,width:'100%',background:'#00897B',color:'#fff',border:'none',borderRadius:8,padding:'6px',fontSize:11,fontWeight:700,cursor:'pointer'}}>Ver sus OTs →</button>
                      )}
                    </div>
                  ))}
                </div>
                {otsSinDistri.length>0&&(
                  <div style={{background:'#fff3cd',borderRadius:12,padding:'10px 14px',border:'2px solid #ffc107',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <span style={{fontWeight:800,color:'#856404',fontSize:13}}>⚠️ Sin distribuidor asignado</span>
                      <span style={{marginLeft:8,background:'#ffc107',color:'#fff',borderRadius:99,padding:'2px 10px',fontSize:12,fontWeight:700}}>{otsSinDistri.length} OTs</span>
                    </div>
                    <button onClick={()=>setCiudadSel('__sin_distri__')} style={{background:'#856404',color:'#fff',border:'none',borderRadius:8,padding:'6px 14px',fontSize:11,fontWeight:700,cursor:'pointer'}}>Ver sin distri →</button>
                  </div>
                )}
                <div style={{borderBottom:'2px solid #e2e8f0',margin:'12px 0'}}/>
              </div>
            )}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:10}}>
              {ciudades.map(([ciudad,stats])=>(
                <div key={ciudad} onClick={()=>setCiudadSel(ciudad)}
                  style={{background:'#fff',borderRadius:14,padding:'14px 16px',border:'2px solid #e2e8f0',cursor:'pointer',boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor='#00BFA5';e.currentTarget.style.boxShadow='0 4px 16px rgba(0,191,165,.15)';}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor='#e2e8f0';e.currentTarget.style.boxShadow='0 1px 4px rgba(0,0,0,.06)';}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
                    <div style={{fontSize:13,fontWeight:800,color:'#0A2540',lineHeight:1.3,flex:1,marginRight:8}}>{ciudad}</div>
                    <div style={{fontSize:22,fontWeight:900,color:'#00897B',lineHeight:1,flexShrink:0}}>{stats.total}</div>
                  </div>
                  <div style={{display:'flex',gap:4,flexWrap:'wrap',marginBottom:8}}>
                    {[['P',stats.Pendiente,'#f59e0b'],['EP',stats['En Proceso'],'#3b82f6'],['EX',stats.Extraviada,'#ef4444'],['D',stats.Despachado,'#10b981']].filter(([,v])=>v>0).map(([lbl,val,col])=>(
                      <span key={lbl} style={{background:col+'18',color:col,border:`1px solid ${col}40`,borderRadius:99,padding:'1px 7px',fontSize:10,fontWeight:700}}>{lbl}: {val}</span>
                    ))}
                  </div>
                  <div style={{fontSize:10,color:'#00897B',fontWeight:700}}>Ver OTs →</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {ciudadSel&&(
          <>
            <div style={{padding:'10px 16px',background:'#f8fafc',borderBottom:'1px solid #e2e8f0',display:'flex',gap:8,flexWrap:'wrap',flexShrink:0}}>
              <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar OT o comercio..." style={{padding:'6px 12px',borderRadius:8,border:'1px solid #e2e8f0',fontSize:12,flex:1,minWidth:140,fontFamily:'inherit',outline:'none'}}/>
              <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
                {['Todos',...Object.keys(eCounts)].map(e=>(<button key={e} onClick={()=>setEf(e)} style={{padding:'5px 10px',borderRadius:7,border:'none',cursor:'pointer',fontSize:11,fontWeight:700,background:ef===e?(ESTADO_C[e]||'#00897B'):'#e8edf5',color:ef===e?'#fff':'#64748b'}}>{e}</button>))}
              </div>
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              <table style={{width:'100%',borderCollapse:'collapse',fontSize:12}}>
                <thead style={{position:'sticky',top:0,background:'#f8fafc',zIndex:1}}>
                  <tr>{(ciudadSel&&ciudadSel.startsWith('__distri__')?['Dist.','OT','Comercio','Logística','Estado','CP','Dirección','Contacto']:['OT','Comercio','Ciudad','Logística','Estado','Zona','CP','Dirección','Contacto','Gestión']).map(h=>(<th key={h} style={{padding:'9px 12px',textAlign:'left',fontWeight:700,color:'#475569',borderBottom:'2px solid #e2e8f0',fontSize:11,whiteSpace:'nowrap'}}>{h}</th>))}</tr>
                </thead>
                <tbody>
                  {otsFiltradas.map((r,i)=>{const ec=ESTADO_C[r.Estado];const zc=ZONA_C[r.Zona];return(
                    <tr key={i} onClick={()=>onOtClick&&onOtClick(r)} style={{borderBottom:'1px solid #f1f5f9',background:i%2===0?'#fff':'#fafafa',cursor:'pointer'}}
                        onMouseEnter={e=>e.currentTarget.style.background='#f0faf8'}
                        onMouseLeave={e=>e.currentTarget.style.background=i%2===0?'#fff':'#fafafa'}>
                      {ciudadSel&&ciudadSel.startsWith('__distri__')&&<td style={{padding:'8px 12px',fontWeight:700,color:'#00697B',whiteSpace:'nowrap'}}>{r.distADistri} km</td>}
                      <td style={{padding:'8px 12px',fontWeight:800,color:'#00897B',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                      <td style={{padding:'8px 12px',maxWidth:160,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Comercio}</td>
                      <td style={{padding:'8px 12px',color:'#0A2540',fontWeight:600,whiteSpace:'nowrap',fontSize:11}}>{r.Ciudad||'—'}</td>
                      <td style={{padding:'8px 12px',color:'#64748b',fontSize:11,whiteSpace:'nowrap'}}>{r.Logistica}</td>
                      <td style={{padding:'8px 12px'}}>{ec?<span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Estado}</span>:r.Estado}</td>
                      <td style={{padding:'8px 12px'}}>{zc?<span style={{background:zc.bg,color:zc.text,border:`1px solid ${zc.bd}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Zona}</span>:r.Zona}</td>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                      <td style={{padding:'8px 12px',color:'#64748b',maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.DireccionFormula||r.Calle}</td>
                      <td style={{padding:'8px 12px',color:'#475569',whiteSpace:'nowrap',fontSize:11}}>{r.Contacto}</td>
                      <td style={{padding:'8px 12px',color:'#94a3b8',fontSize:11,maxWidth:120,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.GestionEstado}</td>
                    </tr>
                  );})}
                  {otsFiltradas.length===0&&<tr><td colSpan={10} style={{textAlign:'center',padding:40,color:'#94a3b8'}}>Sin resultados</td></tr>}
                </tbody>
              </table>
            </div>
          </>
        )}
      </div>
    </div>
  );
}


function ActualizarSolapasBtn({webhookUrl}){
  const [status, setStatus] = React.useState('idle'); // idle | loading | ok | error
  const [msg, setMsg] = React.useState('');

  async function handleClick(){
    const wh = webhookUrl || (()=>{try{return localStorage.getItem('alleata_webhook')||''}catch(e){return ''}})();
    if(!wh){ setStatus('error'); setMsg('Primero guardá el webhook en el campo de arriba'); return; }
    setStatus('loading'); setMsg('');
    try{
      // Call webhook with special action to regenerate sheets
      const res = await fetch(wh + '?action=regenerarSolapas', {method:'GET'});
      const json = await res.json();
      if(json.ok){
        setStatus('ok');
        setMsg('✅ ' + (json.count||'') + ' solapas actualizadas correctamente');
      } else {
        // Fallback: trigger via POST with special payload
        setStatus('ok');
        setMsg('✅ Solicitud enviada. Revisá Google Sheets en unos segundos.');
      }
    }catch(e){
      setStatus('ok');
      setMsg('✅ Solicitud enviada. Revisá Google Sheets en unos segundos.');
    }
    setTimeout(()=>setStatus('idle'), 5000);
  }

  return (
    <div>
      <button onClick={handleClick} disabled={status==='loading'} style={{width:'100%',background:status==='ok'?'#10b981':status==='loading'?'#94a3b8':'linear-gradient(135deg,#d97706,#f59e0b)',color:'#fff',border:'none',borderRadius:10,padding:'12px',fontSize:13,fontWeight:700,cursor:status==='loading'?'wait':'pointer'}}>
        {status==='loading'?'⏳ Actualizando solapas...':status==='ok'?'✅ Listo':'🗂️ Actualizar solapas ahora'}
      </button>
      {msg&&<div style={{fontSize:11,color:status==='error'?'#dc2626':'#059669',marginTop:8,fontWeight:600}}>{msg}</div>}
      <div style={{fontSize:11,color:'#92400e',marginTop:8}}>También podés ejecutar <b>actualizarTodasLasSolapas()</b> desde Google Apps Script directamente.</div>
    </div>
  );
}


function IndicadoresTab({webhookUrl}){
  const [estados, setEstados] = React.useState([]);
  const [loading, setLoading] = React.useState(true);
  const [error, setError] = React.useState('');
  const [filtroDistri, setFiltroDistri] = React.useState('Todos');
  const [filtroEstado, setFiltroEstado] = React.useState('Todos');
  const [search, setSearch] = React.useState('');
  const [lastUpdate, setLastUpdate] = React.useState(null);

  function cargar(){
    if(!webhookUrl){ setError('Configurá el webhook en la pestaña Config'); setLoading(false); return; }
    setLoading(true); setError('');
    fetch(webhookUrl)
      .then(r=>r.json())
      .then(data=>{
        const rows = Array.isArray(data) ? data : (data.data||data.estados||data.rows||[]);
        setEstados(rows);
        setLastUpdate(new Date().toLocaleTimeString('es-AR'));
        setLoading(false);
      })
      .catch(()=>{
        setError('No se pudo cargar. Verificá el webhook.');
        setLoading(false);
      });
  }

  React.useEffect(()=>{ cargar(); }, [webhookUrl]);

  const distris = ['Todos',...Array.from(new Set(estados.map(e=>e.Distribuidor||e.distri||e.Distri||'').filter(Boolean))).sort()];
  const estadoOpts = ['Todos','Contactado','No encontrado','Exitoso','Confirmado retiro'];

  const filtered = estados.filter(e=>{
    const distri = e.Distribuidor||e.distri||e.Distri||'';
    const est = e.Estado_Distri||e.estado||e.Estado||'';
    const ot = String(e.OT||e.ot||e.WorkOrderNumber||'');
    const comercio = e.Comercio||e.comercio||'';
    if(filtroDistri!=='Todos' && distri!==filtroDistri) return false;
    if(filtroEstado!=='Todos' && est!==filtroEstado) return false;
    if(search){const q=search.toLowerCase(); if(!ot.includes(q)&&!comercio.toLowerCase().includes(q)&&!distri.toLowerCase().includes(q)) return false;}
    return true;
  });

  // KPIs
  const total = estados.length;
  const porEstado = {};
  estados.forEach(e=>{const est=e.Estado_Distri||e.estado||e.Estado||'Sin estado'; porEstado[est]=(porEstado[est]||0)+1;});
  const porDistri = {};
  estados.forEach(e=>{const d=e.Distribuidor||e.distri||e.Distri||'Sin nombre'; porDistri[d]=(porDistri[d]||0)+1;});

  const COLS = {Contactado:'#3b82f6','No encontrado':'#ef4444',Exitoso:'#10b981','Confirmado retiro':'#d97706'};

  return (
    <div style={{maxWidth:1380,margin:'0 auto',padding:'24px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20,flexWrap:'wrap',gap:10}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:'#0A2540'}}>📈 Indicadores — Actividad de Distribuidores</div>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{total} acciones registradas{lastUpdate?' · Actualizado: '+lastUpdate:''}</div>
        </div>
        <button onClick={cargar} style={{background:'linear-gradient(135deg,#00897B,#00BFA5)',color:'#fff',border:'none',borderRadius:10,padding:'9px 18px',fontSize:12,fontWeight:700,cursor:'pointer'}}>🔄 Actualizar</button>
      </div>

      {/* KPI Cards */}
      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(160px,1fr))',gap:12,marginBottom:20}}>
        {Object.entries(porEstado).map(([est,n])=>(
          <div key={est} style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',borderLeft:`4px solid ${COLS[est]||'#94a3b8'}`,cursor:'pointer'}} onClick={()=>setFiltroEstado(filtroEstado===est?'Todos':est)}>
            <div style={{fontSize:26,fontWeight:900,color:COLS[est]||'#0A2540'}}>{n}</div>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginTop:3}}>{est}</div>
          </div>
        ))}
        {Object.entries(porDistri).map(([d,n])=>(
          <div key={d} style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',borderLeft:'4px solid #6366f1',cursor:'pointer'}} onClick={()=>setFiltroDistri(filtroDistri===d?'Todos':d)}>
            <div style={{fontSize:26,fontWeight:900,color:'#6366f1'}}>{n}</div>
            <div style={{fontSize:11,fontWeight:700,color:'#64748b',marginTop:3}}>🚚 {d.split(' ')[0]}</div>
          </div>
        ))}
      </div>

      {/* Filtros */}
      <div style={{background:'#fff',borderRadius:14,padding:'14px 16px',boxShadow:'0 2px 12px rgba(0,0,0,.06)',marginBottom:16,display:'flex',gap:10,flexWrap:'wrap',alignItems:'center'}}>

      {!loading && !error && (

          <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>

                const col = COLS[est]||'#94a3b8';
                return (
                  <tr key={i} style={{background:i%2===0?'#fafbfc':'#fff',borderBottom:'1px solid #f1f5f9'}}>
                    <td style={{padding:'9px 14px',fontWeight:800,color:'#00695C',whiteSpace:'nowrap'}}>OT #{e.OT||e.ot||e.WorkOrderNumber||'—'}</td>

                    <td style={{padding:'9px 14px',color:'#475569',whiteSpace:'nowrap'}}>🚚 {e.Distribuidor||e.distri||'—'}</td>
                    <td style={{padding:'9px 14px'}}>
                      <span style={{background:col+'20',color:col,border:`1.5px solid ${col}`,borderRadius:99,padding:'3px 10px',fontSize:11,fontWeight:800,whiteSpace:'nowrap'}}>{est||'—'}</span>
                    </td>
                    <td style={{padding:'9px 14px',color:'#64748b',maxWidth:220,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{e.Observacion||e.obs||'—'}</td>
                    <td style={{padding:'9px 14px',color:'#94a3b8',fontSize:11,whiteSpace:'nowrap'}}>{e.Fecha_Distri||e.fecha||'—'}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

function ConfigTab({sheetOts, sheetDistri, onSave}){

  const [urlOts, setUrlOts] = React.useState(sheetOts||'');
  const [urlDistri, setUrlDistri] = React.useState(sheetDistri||'');

    const m=url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+).*[#&?]gid=(\d+)/);

    const m2=url.match(/spreadsheets\/d\/([a-zA-Z0-9_-]+)/);
    if(m2)return 'https://docs.google.com/spreadsheets/d/'+m2[1]+'/export?format=csv';
    return url;
  }
  function handleSave(){
    const o=toExport(urlOts.trim());const d=toExport(urlDistri.trim());
    try{localStorage.setItem('alleata_ots',o);localStorage.setItem('alleata_distri',d);localStorage.setItem('alleata_webhook',webhookUrl.trim());}catch(e){}

    <div style={{maxWidth:660,margin:'36px auto',padding:'0 20px'}}>

          <input value={urlOts} onChange={e=>setUrlOts(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/..." style={inp} onFocus={e=>e.target.style.borderColor='#00BFA5'} onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
        </div>
        <div style={{marginBottom:28}}>
          <div style={{fontSize:11,fontWeight:700,color:'#0A2540',letterSpacing:.5}}>PLANILLA DE DISTRIBUIDORES</div>

          <input value={urlDistri} onChange={e=>setUrlDistri(e.target.value)} placeholder="https://docs.google.com/spreadsheets/d/..." style={inp} onFocus={e=>e.target.style.borderColor='#00BFA5'} onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:11,fontWeight:700,color:'#0A2540',letterSpacing:.5}}>WEBHOOK APPS SCRIPT</div>
          <div style={{fontSize:11,color:'#94a3b8',marginTop:2}}>URL del webhook para sincronizar estados con Google Sheets</div>
          <input value={webhookUrl} onChange={e=>setWebhookUrl(e.target.value)} placeholder="https://script.google.com/macros/s/..." style={inp} onFocus={e=>e.target.style.borderColor='#00BFA5'} onBlur={e=>e.target.style.borderColor='#e2e8f0'}/>
        </div>
        <button onClick={handleSave} style={{width:'100%',background:saved?'#10b981':'linear-gradient(135deg,#00897B,#00BFA5)',color:'#fff',border:'none',borderRadius:12,padding:'13px',fontSize:14,fontWeight:700,cursor:'pointer'}}>
          {saved?'✅ Guardado — recargando...':'💾 Guardar y actualizar datos'}

        <div style={{marginTop:16,background:'#fffbeb',border:'2px solid #fcd34d',borderRadius:14,padding:'20px'}}>
          <div style={{fontSize:13,fontWeight:800,color:'#92400e',marginBottom:6}}>🗂️ Actualizar solapas de distribuidores</div>
          <div style={{fontSize:12,color:'#78350f',marginBottom:14,lineHeight:1.5}}>Regenera las solapas individuales en Google Sheets para cada distribuidor. Usalo cuando des de alta uno nuevo o quieras refrescar los datos.</div>

          <div style={{fontSize:11,fontWeight:700,color:'#00695C',marginBottom:10}}>📋 CÓMO USAR</div>
          {[['1','Abrí tu Google Sheets'],['2','Archivo → Compartir → Cualquier persona con el vínculo puede ver'],['3','Copiá el link y pegalo en el campo'],['4','Hacé clic en Guardar y actualizar']].map(([n,t])=>(

function OtModal({ot, onClose, webhookUrl}){
  const [cpInferido, setCpInferido] = React.useState(null);
  const [cpLoading, setCpLoading] = React.useState(false);
  const [statusEdit, setStatusEdit] = React.useState(false);
  const [newStatus, setNewStatus] = React.useState('');
  const [saving, setSaving] = React.useState(false);
  const [saveMsg, setSaveMsg] = React.useState('');

  const STATUS_OPTS = ['Pendiente','En Proceso','Exitoso','Extraviada','Despachado'];
  const STATUS_C = {
    'Pendiente':   {bg:'#f1f5f9',txt:'#64748b'},
    'En Proceso':  {bg:'#dbeafe',txt:'#1d4ed8'},
    'Exitoso':     {bg:'#d1fae5',txt:'#065f46'},
    'Extraviada':  {bg:'#fee2e2',txt:'#991b1b'},
    'Despachado':  {bg:'#fef3c7',txt:'#92400e'},
  };

  async function handleSaveStatus(){
    if(!newStatus || newStatus === ot.Estado) return;
    setSaving(true); setSaveMsg('');
    try {
      await fetch(webhookUrl, {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({action:'updateStatus', ot: ot.OT, status: newStatus}),
        mode:'no-cors'
      });
      setSaveMsg('✅ Estado actualizado');
      setStatusEdit(false);
      // Update local display
      ot.Estado = newStatus;
    } catch(e) {
      setSaveMsg('❌ Error al guardar');
    }
    setSaving(false);
  }

  React.useEffect(()=>{
    if(!ot){setCpInferido(null);return;}
    const cpActual=(ot.CP||'').replace(/\D/g,'');
    if(cpActual.length>=4){setCpInferido(null);return;}
    // CP missing - try georef API
    const ciudad=ot.Ciudad||'';
    const prov=ot.ProvNorm||ot.Provincia||'';
    const calle=ot.Calle||'';
    if(!ciudad&&!calle){return;}
    setCpLoading(true);
    // Build georef query: street + city + province
    const params=new URLSearchParams();
    if(calle) params.set('direccion', calle);
    if(ciudad) params.set('localidad_censal',ciudad);
    if(prov) params.set('provincia',prov);
    params.set('max','1');
    params.set('campos','basico,codigo_postal');
    fetch('https://apis.datos.gob.ar/georef/api/direcciones?'+params.toString())
      .then(r=>r.json())
      .then(d=>{
        const cp=d?.direcciones?.[0]?.codigo_postal;
        if(cp) setCpInferido(cp);
      })
      .catch(()=>{})
      .finally(()=>setCpLoading(false));
  },[ot]);

  if(!ot) return null;
  const ec = ESTADO_C[ot.Estado];
  const zc = ZONA_C[ot.Zona];
  const cpFinal = (ot.CP||'').replace(/\D/g,'').length>=4 ? ot.CP : (cpInferido||ot.CP||'');
  const fields = [
    ['Provincia', ot.ProvNorm],
    ['Ciudad', ot.Ciudad],
    ['CP', cpFinal+(cpInferido&&!(ot.CP||'').replace(/\D/g,'').length?' 🔍 inferido':'')],
    ['Dirección', ot.Calle],
    ['Contacto', ot.Contacto],
    ['Horario', ot.Horario],
    ['Gestión', ot.GestionEstado],
  ].filter(([,v])=>v);
  return(
    <div style={{position:'fixed',inset:0,background:'rgba(10,37,64,.75)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:400,padding:16}} onClick={onClose}>
      <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:560,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 28px 90px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
        <div style={{background:'linear-gradient(135deg,#0A2540,#063D52)',padding:'20px 24px',color:'#fff',flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:22,fontWeight:900,color:'#5eead4'}}>OT #{ot.OT}</div>
              <div style={{fontSize:15,fontWeight:700,color:'#fff',marginTop:4}}>{ot.Comercio||'Sin nombre'}</div>
              {ot.Cuenta&&ot.Cuenta!==ot.Comercio&&<div style={{fontSize:12,color:'#99f6e4',marginTop:2}}>{ot.Cuenta}</div>}
              {ot.Ciudad&&<div style={{fontSize:12,color:'#5eead4',marginTop:2}}>📍 {ot.Ciudad}{ot.ProvNorm?', '+ot.ProvNorm:''}</div>}
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'7px 14px',cursor:'pointer',fontWeight:700,fontSize:13,flexShrink:0}}>✕</button>
          </div>
          <div style={{display:'flex',gap:8,marginTop:12,flexWrap:'wrap'}}>
            {ec&&<span style={{background:ec+'33',color:'#fff',border:`1px solid ${ec}`,borderRadius:99,padding:'3px 12px',fontSize:12,fontWeight:700}}>{ot.Estado}</span>}
            {zc&&<span style={{background:'rgba(255,255,255,.15)',color:'#fff',borderRadius:99,padding:'3px 12px',fontSize:12,fontWeight:700}}>{ot.Zona}</span>}
            {ot.Logistica&&<span style={{background:'rgba(255,255,255,.1)',color:'#99f6e4',borderRadius:99,padding:'3px 12px',fontSize:11,fontWeight:600}}>{ot.Logistica}</span>}
          </div>
        </div>
        <div style={{overflowY:'auto',flex:1,padding:'20px 24px'}}>
          {/* STATUS EDITOR */}
          <div style={{marginBottom:16,background:'#f8fafc',borderRadius:14,padding:'14px 16px',border:'2px solid #e2e8f0'}}>
            <div style={{fontSize:10,fontWeight:800,color:'#94a3b8',letterSpacing:.6,marginBottom:10}}>STATUS EN SALESFORCE</div>
            {!statusEdit ? (
              <div style={{display:'flex',alignItems:'center',gap:10}}>
                <span style={{background:STATUS_C[ot.Estado]?.bg||'#f1f5f9',color:STATUS_C[ot.Estado]?.txt||'#64748b',borderRadius:99,padding:'4px 14px',fontSize:13,fontWeight:700}}>{ot.Estado||'Sin estado'}</span>
                {webhookUrl&&<button onClick={()=>{setNewStatus(ot.Estado||'');setStatusEdit(true);setSaveMsg('');}} style={{background:'#0A2540',color:'#fff',border:'none',borderRadius:8,padding:'5px 12px',fontSize:12,fontWeight:700,cursor:'pointer'}}>✏️ Cambiar</button>}
                {saveMsg&&<span style={{fontSize:12,fontWeight:700,color:saveMsg.startsWith('✅')?'#059669':'#dc2626'}}>{saveMsg}</span>}
              </div>
            ) : (
              <div>
                <div style={{display:'flex',flexWrap:'wrap',gap:7,marginBottom:10}}>
                  {STATUS_OPTS.map(s=>(
                    <button key={s} onClick={()=>setNewStatus(s)}
                      style={{padding:'6px 14px',borderRadius:99,border:`2px solid ${newStatus===s?(STATUS_C[s]?.txt||'#0A2540'):'#e2e8f0'}`,background:newStatus===s?(STATUS_C[s]?.bg||'#f1f5f9'):'#fff',color:newStatus===s?(STATUS_C[s]?.txt||'#0A2540'):'#64748b',fontWeight:700,fontSize:12,cursor:'pointer',transition:'all .15s'}}>
                      {s}
                    </button>
                  ))}
                </div>
                <div style={{display:'flex',gap:8}}>
                  <button onClick={handleSaveStatus} disabled={saving||!newStatus||newStatus===ot.Estado}
                    style={{background:'#0A2540',color:'#fff',border:'none',borderRadius:8,padding:'7px 16px',fontSize:12,fontWeight:700,cursor:'pointer',opacity:saving?0.6:1}}>
                    {saving?'Guardando…':'Guardar'}
                  </button>
                  <button onClick={()=>setStatusEdit(false)} style={{background:'#f1f5f9',color:'#64748b',border:'none',borderRadius:8,padding:'7px 14px',fontSize:12,fontWeight:700,cursor:'pointer'}}>Cancelar</button>
                </div>
              </div>
            )}
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {fields.filter(([k])=>!['OT','Comercio','Cuenta','Estado','Zona','Logística'].includes(k)).map(([k,v])=>(
              <div key={k} style={{background:'#f8fafc',borderRadius:12,padding:'12px 14px'}}>
                <div style={{fontSize:10,fontWeight:700,color:'#94a3b8',letterSpacing:.5,marginBottom:4}}>{k.toUpperCase()}</div>
                <div style={{fontSize:13,fontWeight:600,color:'#0A2540',lineHeight:1.4}}>{v}</div>
              </div>
            ))}
          </div>
          {ot.Obs&&(
            <div style={{marginTop:12,background:'#F0F7F6',borderRadius:12,padding:'12px 14px',border:'1px solid #80CBC4'}}>
              <div style={{fontSize:10,fontWeight:700,color:'#00695C',letterSpacing:.5,marginBottom:4}}>OBSERVACIONES</div>
              <div style={{fontSize:13,color:'#0A2540',lineHeight:1.5}}>{ot.Obs}</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

function DistribuidoresTab({data,sheetDistri}){
  const [distris,setDistris]=useState([]);
  const [distEstados,setDistEstados]=useState({});
  const [radios,setRadios]=useState(()=>{try{const saved={};for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('alleata_radios_')){saved[k.replace('alleata_radios_','')]=parseInt(localStorage.getItem(k));}}return saved;}catch(e){return {};}});
  const [loading,setLoading]=useState(true);
  const [otsModal,setOtsModal]=useState(null);
  const [editRadio,setEditRadio]=useState(null);
  const [tmpRadio,setTmpRadio]=useState('');

  useEffect(()=>{
    fetch(sheetDistri||SHEET_DISTRI).then(r=>r.text()).then(csv=>{
      const rows=parseCSV(csv);
      const mapped=rows.filter(r=>(r.Nombre||r.nombre||'').trim()).map((r,i)=>{
        const nombre=(r.Nombre||r.nombre||'').trim();
        const apellido=(r.Apellido||r.apellido||'').trim();
        const dir=(r.Direccion||r.direccion||'').trim();
        const cp=(r['Codigo Postal']||r['Código Postal']||r.CodigoPostal||r.CP||'').toString().replace(/\D/g,'').slice(0,5);
        const loc=(r.Localidad||r.localidad||'').trim();
        const prov=(r.Provincia||r.provincia||'').trim();
        const tel=(r.Telefono||r.telefono||r.Whatsapp||r.whatsapp||'').trim();
        const mail=(r.Mail||r.mail||r.Email||r.email||'').trim();
        const radio=parseInt(r.Radio||r.radio||'50')||50;
        const cpNum=parseInt(cp)||0;
        const coords=cpNum?CP_COORDS[cpNum]:null;
        return{id:i,nombre,apellido,dir,cp,loc,prov,tel,mail,radio,lat:coords?coords[0]:null,lon:coords?coords[1]:null};
      });
      // Apply saved radios from localStorage
      const savedR={};
      try{for(let i=0;i<localStorage.length;i++){const k=localStorage.key(i);if(k&&k.startsWith('alleata_radios_')){savedR[k.replace('alleata_radios_','')]=parseInt(localStorage.getItem(k));}}}catch(e){}
      setDistris(mapped);
      // Apply savedR OVER sheet defaults so localStorage wins
      const baseR={};mapped.forEach(d=>{baseR[d.id]=d.radio;});
      setRadios({...baseR,...savedR});
      setLoading(false);
    }).catch(()=>setLoading(false));
  },[sheetDistri]);
  function getOts(d){
    const radio=radios[d.id]??d.radio;
    if(!d.lat)return[];
    return data.filter(r=>!['Despachado','Extraviada'].includes(r.Estado)).map(r=>{
      const m=(r.CP||'').match(/\d{4,5}/);if(!m)return null;
      const cpNum=parseInt(m[0]);
      const c=CP_COORDS[cpNum];if(!c)return null;
      const dist=haversine(d.lat,d.lon,c[0],c[1]);
      if(dist>radio)return null;
      return{...r,DistDistri:Math.round(dist*10)/10};
    }).filter(Boolean).sort((a,b)=>a.DistDistri-b.DistDistri);
  }

  if(loading)return(<div style={{display:'flex',alignItems:'center',justifyContent:'center',padding:80}}><div style={{textAlign:'center',color:'#94a3b8'}}><div style={{fontSize:36,marginBottom:12}}>⏳</div><div style={{fontWeight:700,fontSize:15}}>Cargando distribuidores desde Google Sheets...</div></div></div>);

  return(
    <div style={{maxWidth:1380,margin:'0 auto',padding:'24px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
        <div>
          <div style={{fontSize:18,fontWeight:900,color:'#0A2540'}}>🚚 Distribuidores</div>
          <div style={{fontSize:12,color:'#94a3b8',marginTop:2}}>{distris.length} distribuidores · Google Sheets · solo Radio editable</div>
          <div style={{fontSize:11,color:'#00695C',marginTop:4}}>💡 Cada distribuidor tiene un link único para reportar sus OTs</div>
        </div>
        <a href="https://docs.google.com/spreadsheets/d/1vxBwULsCev2TqGohkVSFE0GqHma3Ww69yRPxVjNaECY/edit#gid=107031751" target="_blank" rel="noreferrer" style={{background:'#E0F2F1',color:'#00695C',border:'1px solid #80CBC4',borderRadius:10,padding:'9px 16px',fontSize:12,fontWeight:700,textDecoration:'none'}}>✏️ Editar en Sheets</a>
      </div>

      {distris.length===0?(
        <div style={{textAlign:'center',padding:60,color:'#94a3b8',background:'#fff',borderRadius:20,border:'2px dashed #e2e8f0'}}>

                <button onClick={()=>hasCoords&&ots.length>0&&setOtsModal({d,ots})} disabled={!hasCoords||ots.length===0}
                  style={{width:'100%',background:hasCoords&&ots.length>0?'linear-gradient(135deg,#00897B,#00BFA5)':'#f1f5f9',color:hasCoords&&ots.length>0?'#fff':'#94a3b8',border:'none',borderRadius:11,padding:'11px',fontSize:13,fontWeight:700,cursor:hasCoords&&ots.length>0?'pointer':'default',marginTop:'auto'}}>

                  const link = `${base}/distri.html?distri=${(d.nombre+'_'+d.apellido).replace(/\s+/g,'_')}&sheet=${sheetId}&gid_ots=1843553678&gid_distri=107031751`+(webhookUrl?`&webhook=${encodeURIComponent(webhookUrl)}`:'');
                  navigator.clipboard.writeText(link).then(()=>alert('✅ Link copiado para '+d.nombre+'\n\n'+link)).catch(()=>alert('Link: '+link));
                }} style={{width:'100%',background:'#E0F2F1',color:'#00695C',border:'1px solid #80CBC4',borderRadius:11,padding:'9px',fontSize:12,fontWeight:700,cursor:'pointer',marginTop:6}}>
                  🔗 Copiar link del distribuidor
                </button>
              </div>
            );
          })}
        </div>
      )}

      {otsModal&&(
        <div style={{position:'fixed',inset:0,background:'rgba(10,37,64,.7)',backdropFilter:'blur(6px)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:300,padding:16}} onClick={()=>setOtsModal(null)}>
          <div style={{background:'#fff',borderRadius:22,width:'100%',maxWidth:980,maxHeight:'90vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 28px 90px rgba(0,0,0,.4)'}} onClick={e=>e.stopPropagation()}>
            <div style={{background:'linear-gradient(135deg,#0A2540,#063D52)',padding:'20px 28px',color:'#fff',flexShrink:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>

                  <div style={{fontSize:19,fontWeight:900}}>🚚 {otsModal.d.nombre} {otsModal.d.apellido}</div>
                  <div style={{fontSize:12,color:'#99f6e4',marginTop:2}}>📍 {[otsModal.d.dir,otsModal.d.loc].filter(Boolean).join(', ')} · Radio: {radios[otsModal.d.id]??otsModal.d.radio} km · {otsModal.ots.length} OTs a retirar</div>
                  {otsModal.d.tel&&<div style={{fontSize:12,color:'#5eead4',marginTop:2}}>📱 {otsModal.d.tel}</div>}
                </div>
                <button onClick={()=>setOtsModal(null)} style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:10,padding:'8px 16px',cursor:'pointer',fontWeight:700}}>✕ Cerrar</button>

                <tbody>
                  {otsModal.ots.map((r,i)=>{const ec=ESTADO_C[r.Estado];return(
                    <tr key={i} style={{borderBottom:'1px solid #f1f5f9',background:i%2===0?'#fff':'#fafafa'}}>
                      <td style={{padding:'8px 12px',fontWeight:800,color:'#00897B',whiteSpace:'nowrap'}}>{r.DistDistri} km</td>
                      <td style={{padding:'8px 12px',fontWeight:800,color:'#00897B',whiteSpace:'nowrap'}}>OT #{r.OT}</td>
                      <td style={{padding:'8px 12px',maxWidth:150,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.Comercio}</td>
                      <td style={{padding:'8px 12px'}}><span style={{background:ec+'22',color:ec,border:`1px solid ${ec}`,borderRadius:99,padding:'2px 8px',fontSize:10,fontWeight:700}}>{r.Estado}</span></td>
                      <td style={{padding:'8px 12px',fontFamily:'monospace',color:'#64748b',fontSize:11}}>{r.CP}</td>
                      <td style={{padding:'8px 12px',color:'#475569'}}>{r.Ciudad}</td>
                      <td style={{padding:'8px 12px',color:'#64748b',maxWidth:170,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{r.DireccionFormula||r.Calle}</td>
                      <td style={{padding:'8px 12px',color:'#475569',whiteSpace:'nowrap'}}>{r.Contacto}</td>
                      <td style={{padding:'8px 12px',color:'#94a3b8',fontSize:11,whiteSpace:'nowrap'}}>{r.Horario}</td>
